<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🧠 刷题练习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f4f7fc;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px;
        }
        #app {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 32px 32px 24px 24px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 24px);
        }

        /* ===== 顶部栏 ===== */
        .header {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            padding: 16px 16px 14px;
            color: #fff;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }
        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-left a {
            background: rgba(255, 255, 255, 0.18);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .header-left a:active {
            background: rgba(255, 255, 255, 0.30);
        }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }
        .header h1 span { font-size: 20px; }
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .header-actions button {
            background: rgba(255, 255, 255, 0.18);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-actions button:active {
            background: rgba(255, 255, 255, 0.30);
        }
        .header-nav {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .header-nav a {
            flex: 1 1 calc(33.33% - 4px);
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            padding: 6px 6px;
            border-radius: 14px;
            font-size: 11px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .header-nav a:active {
            background: rgba(255, 255, 255, 0.30);
        }
        .header-nav .current {
            background: rgba(255, 255, 255, 0.35);
            font-weight: 600;
        }
        .stat-badge {
            background: rgba(255, 255, 255, 0.20);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ===== 页面容器 ===== */
        .page {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 16px 18px 20px;
            animation: fadeIn 0.30s ease;
            overflow-y: auto;
        }
        .page.active {
            display: flex;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== 通用卡片 ===== */
        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 16px 18px;
            margin-bottom: 14px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .card-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        /* ===== 设置区域 ===== */
        .key-input-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .key-input-group input {
            flex: 1;
            min-width: 120px;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 0.85rem;
            background: #f8fafc;
            color: #1e293b;
            outline: none;
            transition: border-color 0.2s;
        }
        .key-input-group input:focus {
            border-color: #2563eb;
            background: #fff;
        }
        select {
            padding: 8px 14px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-size: 0.85rem;
            color: #1e293b;
            outline: none;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .setting-row span {
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 500;
        }

        /* ===== 按钮 ===== */
        .btn {
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: transform 0.1s, opacity 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #2563eb; }
        .btn-primary:active { background: #1d4ed8; }
        .btn-success { background: #16a34a; }
        .btn-success:active { background: #15803d; }
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
        }
        .btn-secondary:active { background: #e2e8f0; }
        .btn-secondary:disabled { opacity: 0.4; }
        .btn-danger {
            background: #fee2e2;
            color: #dc2626;
        }
        .btn-warning {
            background: #fef9c3;
            color: #a16207;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #2563eb;
            color: #2563eb;
            padding: 6px 14px;
            font-size: 0.8rem;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
        }

        /* ===== 统计栏 ===== */
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .stats-item {
            font-size: 0.8rem;
            color: #475569;
        }
        .stats-item strong {
            font-size: 1rem;
            color: #1e293b;
        }

        /* ===== 题目区 ===== */
        .question-text {
            font-weight: 700;
            font-size: 1.05rem;
            line-height: 1.55;
            color: #0f172a;
            margin: 8px 0 16px;
        }
        .option {
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 40px;
            padding: 11px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            gap: 10px;
            align-items: center;
            transition: all 0.2s;
        }
        .option:active {
            background: #eff6ff;
        }
        .option.selected {
            background: #eff6ff;
            border-color: #2563eb;
        }
        .prefix {
            font-weight: 700;
            color: #2563eb;
            width: 26px;
            font-size: 0.9rem;
        }
        .option-text {
            font-size: 0.9rem;
            color: #1e293b;
        }

        /* ===== 反馈区 ===== */
        .feedback {
            background: #f8fafc;
            border-radius: 16px;
            padding: 14px;
            margin-top: 16px;
            border-left: 4px solid #2563eb;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .feedback strong { color: #0f172a; }
        .correct-badge {
            background: #dcfce7;
            color: #15803d;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .wrong-badge {
            background: #fee2e2;
            color: #dc2626;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .analysis-item {
            margin: 4px 0;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.8rem;
        }
        .analysis-item.correct-opt { background: #dcfce7; }

        /* ===== 选项翻译 ===== */
        .options-translation {
            margin-top: 12px;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 16px;
            font-size: 0.85rem;
        }
        .translation-item { margin: 6px 0; }

        /* ===== 词汇标签 ===== */
        .keyword-chip {
            display: inline-block;
            background: #eef2ff;
            color: #2563eb;
            border-radius: 20px;
            padding: 3px 10px;
            margin: 3px 4px 3px 0;
            font-size: 0.75rem;
        }
        .category-badge {
            display: inline-block;
            background: #f1f5f9;
            color: #64748b;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 6px;
        }

        /* ===== 记录区 ===== */
        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            align-items: center;
        }
        .stat-category {
            background: #eef2ff;
            color: #475569;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            cursor: pointer;
            display: inline-block;
            margin-right: 6px;
            margin-bottom: 6px;
        }
        .record-item {
            background: #f8fafc;
            border-left: 4px solid #2563eb;
            padding: 10px 12px;
            margin-bottom: 10px;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .record-item:active { background: #f1f5f9; }
        .record-item.correct-item { border-left-color: #16a34a; }
        .record-item.wrong-item { border-left-color: #f59e0b; }
        .record-question { font-weight: 600; font-size: 0.85rem; color: #1e293b; }
        .record-detail {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #e2e8f0;
            font-size: 0.8rem;
            line-height: 1.6;
        }

        /* ===== 底部导航 ===== */
        .bottom-nav {
            display: flex;
            border-top: 1px solid #f1f5f9;
            background: #fff;
            flex-shrink: 0;
        }
        .bottom-nav button {
            flex: 1;
            border: none;
            background: none;
            padding: 10px 0 12px;
            font-size: 12px;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-weight: 500;
        }
        .bottom-nav button .nav-icon { font-size: 20px; }
        .bottom-nav button.active {
            color: #2563eb;
            font-weight: 600;
        }
        .bottom-nav button.active::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: #2563eb;
            border-radius: 3px;
        }
        .bottom-nav button {
            position: relative;
        }
        .bottom-nav button:active { opacity: 0.6; }

        /* ===== 工具 ===== */
        .pool-info {
            font-size: 0.72rem;
            background: #eef2ff;
            color: #475569;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
        }
        .error-message {
            color: #dc2626;
            background: #fee2e2;
            padding: 10px;
            border-radius: 16px;
            margin-top: 12px;
            text-align: center;
            font-size: 0.85rem;
        }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

/* ===== 响应式 ===== */
        @media (max-width: 420px) {
            .header h1 { font-size: 16px; }
            .question-text { font-size: 0.95rem; }
            .option { padding: 9px 14px; }
        }

        /* ===== 模拟考试 ===== */
        .exam-timer {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff;
            padding: 12px 16px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 14px;
        }
        .exam-timer .time-display {
            font-size: 2rem;
            font-weight: 700;
            font-family: ui-monospace, monospace;
        }
        .exam-timer .time-label {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 2px;
        }
        .exam-timer.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .exam-timer.danger { background: linear-gradient(135deg, #ef4444, #dc2626); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
        .exam-progress {
            margin-bottom: 14px;
        }
        .exam-progress-bar {
            height: 6px;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 6px;
        }
        .exam-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            border-radius: 6px;
            transition: width 0.3s ease;
        }
        .exam-progress-text {
            font-size: 0.8rem;
            color: #64748b;
            display: flex;
            justify-content: space-between;
        }
        .exam-question-num {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 8px;
        }
        .exam-question-picker {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            margin-top: 12px;
            padding: 10px;
            background: #f8fafc;
            border-radius: 12px;
            max-height: 120px;
            overflow-y: auto;
        }
        .exam-q-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            background: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .exam-q-btn.current {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }
        .exam-q-btn.answered {
            background: #dcfce7;
            color: #15803d;
            border-color: #16a34a;
        }
        .exam-q-btn.wrong {
            background: #fee2e2;
            color: #dc2626;
            border-color: #dc2626;
        }
        .exam-q-btn.unanswered {
            background: #fff;
            color: #94a3b8;
        }
        .exam-q-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .exam-start-card {
            text-align: center;
            padding: 20px;
        }
        .exam-start-card .exam-icon {
            font-size: 64px;
            margin-bottom: 12px;
        }
        .exam-start-card .exam-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .exam-start-card .exam-desc {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .exam-start-card .exam-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
        }
        .exam-start-card .exam-stat-item {
            text-align: center;
        }
        .exam-start-card .exam-stat-num {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2563eb;
        }
        .exam-start-card .exam-stat-label {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 2px;
        }
        .exam-results-card {
            text-align: center;
            padding: 10px 0;
        }
        .exam-results-score {
            font-size: 4rem;
            font-weight: 800;
            color: #2563eb;
            line-height: 1;
        }
        .exam-results-label {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
        }
        .exam-results-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            margin: 12px 0;
        }
        .exam-results-bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 1s ease;
        }
        .exam-results-detail {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 16px 0;
        }
        .exam-results-stat {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
        }
        .exam-results-stat .stat-num {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e293b;
        }
        .exam-results-stat .stat-label {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 2px;
        }
        .exam-results-cat {
            background: #f8fafc;
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.82rem;
        }
        .exam-results-cat-name { font-weight: 500; color: #475569; }
        .exam-results-cat-score { font-weight: 600; }
        .exam-add-to-bank {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #eef2ff;
            color: #4f46e5;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 6px;
        }
        .exam-add-to-bank:active { background: #e0e7ff; }
        .exam-add-to-bank.added { background: #dcfce7; color: #15803d; }

        /* ===== 保存到题库通知 ===== */
        .save-bank-bar {
            display: none;
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 12px;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            border: 1px solid #fbbf24;
            animation: fadeIn 0.3s ease;
        }
        .save-bank-bar.show { display: flex; }
        .save-bank-info {
            font-size: 0.82rem;
            color: #92400e;
            flex: 1;
        }
        .save-bank-info strong { font-weight: 700; }
        .btn-save-bank {
            background: #d97706;
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .btn-save-bank:active { background: #b45309; }
    </style>

<body>

<div id="app">

    <!-- ===== 顶部栏 ===== -->
    <header class="header">
        <div class="header-main">
            <div class="header-left">
                <a href="index.html" aria-label="返回主页">🏠</a>
                <h1><span>🧠</span> 刷题练习</h1>
            </div>
            <div class="header-actions">
                <button id="btnSettings" aria-label="设置">⚙️</button>
            </div>
        </div>
        <div class="header-nav">
<a href="vocabulary_app.html">📘 单词</a>
<a href="practice_coach.html" class="current">📝 考试</a>
<a href="vocab_story.html">📖 故事</a>
<a href="question_bank.html">🗄 题库</a>
<a href="question_batch_generator.html">📦 AI生成</a>
</div>
    </header>

    <!-- ===== 模拟考试页（默认页） ===== -->
    <div id="page-exam" class="page active">
        <div id="examArea"></div>
    </div>

    <!-- ===== 记录页 ===== -->
    <div id="page-records" class="page">
        <div class="filter-bar">
            <span style="font-size:0.8rem; color:#64748b;">筛选：</span>
            <select id="recordFilter" style="font-size:0.8rem;">
                <option value="all">全部</option>
                <option value="wrong">仅错题</option>
                <option value="correct">仅正确</option>
            </select>
            <button class="btn btn-sm btn-secondary" id="refreshRecordBtn">刷新</button>
        </div>
        <div id="categoryStats" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;"></div>
        <div id="recordListContainer" style="flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;"></div>
    </div>

    <!-- ===== 设置页（隐藏，仅通过右上角齿轮访问） ===== -->
    <div id="page-settings" class="page">
        <div style="display:flex; align-items:center; margin-bottom:16px;">
            <button class="btn btn-sm btn-secondary" id="settingsBackBtn">← 返回</button>
            <span style="margin-left:12px; font-weight:600;">设置</span>
        </div>
        <div class="card">
            <div class="card-label">🗂 数据管理</div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button class="btn btn-sm btn-primary" id="exportDataBtn">📥 备份学习数据</button>
                <button class="btn btn-sm btn-outline" id="importDataBtn">📤 恢复学习数据</button>
            </div>
            <div style="font-size:0.75rem; color:#94a3b8; margin-top:8px;">备份包含：刷题记录、考试历史</div>
            <input type="file" id="importDataInput" accept=".json" style="display:none;">
            <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;">
                <button class="btn btn-sm btn-danger" id="clearHistoryBtn">🗑 清空刷题与考试记录</button>
            </div>
        </div>
    </div>

    <!-- ===== 底部导航 ===== -->
    <nav class="bottom-nav">
        <button class="active" data-page="exam">
            <span class="nav-icon">📝</span> 考试
        </button>
        <button data-page="records">
            <span class="nav-icon">📋</span> 记录
        </button>
    </nav>

</div>

<script src="js/data_decrypt.js"></script>
<script>
    // ---------- 页面导航 ----------
    const navBtns = document.querySelectorAll('.bottom-nav button');
    const pageSettings = document.getElementById('page-settings');
    const pages = {
        exam: document.getElementById('page-exam'),
        records: document.getElementById('page-records'),
    };
    function showPage(name) {
        navBtns.forEach(b => b.classList.remove('active'));
        Object.values(pages).forEach(p => p.classList.remove('active'));
        pageSettings.classList.remove('active');
        if (pages[name]) {
            pages[name].classList.add('active');
            document.querySelector(`[data-page="${name}"]`)?.classList.add('active');
        }
        if (name === 'exam') renderExamPage();
        if (name === 'records') updateAllStatsAndRecords();
    }
    navBtns.forEach(btn => {
        btn.addEventListener('click', () => showPage(btn.getAttribute('data-page')));
    });
    document.getElementById('btnSettings').addEventListener('click', () => {
        navBtns.forEach(b => b.classList.remove('active'));
        Object.values(pages).forEach(p => p.classList.remove('active'));
        pageSettings.classList.add('active');
    });
    document.getElementById('settingsBackBtn').addEventListener('click', () => showPage('exam'));

    // ---------- IndexedDB ----------
    const DB_NAME = 'ToeicTrainerDB_final';
    const STORE_NAME = 'records';
    const META_STORE = 'metadata';
    const EXAM_HISTORY_STORE = 'exam_history';
    let db = null;

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 2);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                if (!db.objectStoreNames.contains(META_STORE)) {
                    const metaStore = db.createObjectStore(META_STORE, { keyPath: 'key' });
                    metaStore.put({ key: 'categoryCount', value: {} });
                    metaStore.put({ key: 'allQuestionHashes', value: [] });
                }
                if (!db.objectStoreNames.contains(EXAM_HISTORY_STORE)) {
                    db.createObjectStore(EXAM_HISTORY_STORE, { keyPath: 'id' });
                }
            };
            request.onsuccess = (e) => { db = e.target.result; resolve(db); };
            request.onerror = (e) => reject(e.target.error);
        });
    }

    async function saveRecord(record) {
        if (!db) await openDB();
        const tx = db.transaction([STORE_NAME, META_STORE], 'readwrite');
        await tx.objectStore(STORE_NAME).put(record);
        const metaStore = tx.objectStore(META_STORE);
        const catCount = (await metaStore.get('categoryCount'))?.value || {};
        const cat = record.category || '未分类';
        catCount[cat] = (catCount[cat] || 0) + 1;
        await metaStore.put({ key: 'categoryCount', value: catCount });
        const hash = record.questionText.slice(0, 60);
        let hashes = (await metaStore.get('allQuestionHashes'))?.value || [];
        if (!hashes.includes(hash)) hashes.push(hash);
        if (hashes.length > 200) hashes = hashes.slice(-200);
        await metaStore.put({ key: 'allQuestionHashes', value: hashes });
        return new Promise((resolve) => { tx.oncomplete = resolve; });
    }

    async function getAllRecords() {
        if (!db) await openDB();
        return new Promise((resolve) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const req = tx.objectStore(STORE_NAME).getAll();
            req.onsuccess = () => resolve(req.result || []);
        });
    }

    async function clearAllRecords() {
        if (!db) await openDB();
        const tx = db.transaction([STORE_NAME, META_STORE], 'readwrite');
        await tx.objectStore(STORE_NAME).clear();
        await tx.objectStore(META_STORE).put({ key: 'categoryCount', value: {} });
        await tx.objectStore(META_STORE).put({ key: 'allQuestionHashes', value: [] });
        return new Promise((resolve) => { tx.oncomplete = resolve; });
    }

    async function getCategoryCount() {
        if (!db) await openDB();
        const tx = db.transaction(META_STORE, 'readonly');
        const res = await tx.objectStore(META_STORE).get('categoryCount');
        return res?.value || {};
    }

    async function getAllQuestionHashes() {
        if (!db) await openDB();
        const tx = db.transaction(META_STORE, 'readonly');
        const res = await tx.objectStore(META_STORE).get('allQuestionHashes');
        return res?.value || [];
    }


    // ---------- 全局变量 ----------
    let currentQuestionSource = localStorage.getItem('toeic_question_source') || 'builtIn';
    let statsTotal = 0, statsAccuracy = 0, statsWrong = 0;
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const recordFilter = document.getElementById('recordFilter');
    const refreshRecordBtn = document.getElementById('refreshRecordBtn');
    const categoryStatsDiv = document.getElementById('categoryStats');
    const recordListContainer = document.getElementById('recordListContainer');

    function renderKeywords(keywords) {
        if (!keywords || !Array.isArray(keywords)) return '—';
        if (keywords.length > 0 && typeof keywords[0] === 'object' && keywords[0].word) {
            return keywords.map(kw => `<span class="keyword-chip">${kw.word} (${kw.pos}) ${kw.meaning}</span>`).join('');
        }
        return keywords.map(kw => `<span class="keyword-chip">${kw}</span>`).join('');
    }

    async function updateAllStatsAndRecords() {
        const records = await getAllRecords();
        const total = records.length;
        const correctNum = records.filter(r => r.correct === true).length;
        const wrongNum = total - correctNum;
        const accuracy = total === 0 ? 0 : Math.round((correctNum / total) * 100);
        statsTotal = total;
        statsAccuracy = accuracy;
        statsWrong = wrongNum;

        const categoryStats = {};
        records.forEach(rec => {
            const cat = rec.category || '未分类';
            if (!categoryStats[cat]) categoryStats[cat] = { total: 0, correct: 0 };
            categoryStats[cat].total++;
            if (rec.correct) categoryStats[cat].correct++;
        });
        categoryStatsDiv.innerHTML = Object.entries(categoryStats).map(([cat, stat]) => {
            const percent = stat.total === 0 ? 0 : Math.round((stat.correct / stat.total) * 100);
            return `<span class="stat-category" data-cat="${cat}">${cat} : ${stat.correct}/${stat.total} (${percent}%)</span>`;
        }).join('');
        document.querySelectorAll('.stat-category').forEach(el => {
            el.onclick = () => {
                window.currentCategoryFilter = el.getAttribute('data-cat');
                renderRecords();
            };
        });
        await renderRecords();
    }

    async function renderRecords() {
        const records = await getAllRecords();
        const filterValue = recordFilter.value;
        let filtered = records;
        if (filterValue === 'wrong') filtered = records.filter(r => r.correct === false);
        if (filterValue === 'correct') filtered = records.filter(r => r.correct === true);
        if (window.currentCategoryFilter && window.currentCategoryFilter !== 'all') {
            filtered = filtered.filter(r => (r.category || '未分类') === window.currentCategoryFilter);
        } else {
            window.currentCategoryFilter = null;
        }
        filtered.sort((a, b) => b.timestamp - a.timestamp);
        if (filtered.length === 0) {
            recordListContainer.innerHTML = '<div style="text-align:center; padding:40px 20px; color:#94a3b8;">暂无记录</div>';
            return;
        }
        const letters = ['A','B','C','D'];
        recordListContainer.innerHTML = filtered.map(rec => {
            let analysisHtml = '';
            if (Array.isArray(rec.wrongOptionAnalysis) && rec.wrongOptionAnalysis.length === 4 && Array.isArray(rec.options) && rec.options.length === 4) {
                analysisHtml = rec.wrongOptionAnalysis.map((a, i) => {
                    const isCorrectOpt = (letters[i] === rec.correctAnswer);
                    return `<div class="analysis-item ${isCorrectOpt ? 'correct-opt' : ''}">${isCorrectOpt ? '✅' : '❌'} <strong>${letters[i]}. ${rec.options[i]}</strong>: ${a}</div>`;
                }).join('');
            } else {
                analysisHtml = `<div>⚠️ 选项分析：${rec.wrongOptionAnalysis || '—'}</div>`;
            }
            return `
            <div class="record-item ${rec.correct ? 'correct-item' : 'wrong-item'}" data-id="${rec.id}">
                <div class="record-question">
                    ${rec.correct ? '✅' : '❌'} ${rec.questionText}
                    <span class="category-badge">${rec.category || '未分类'}</span>
                </div>
                <div style="font-size:0.75rem; margin-top:4px; color:#64748b;">你的答案: ${rec.userAnswer} | 正确答案: ${rec.correctAnswer}</div>
                <div class="record-detail" style="display:none;">
                    <div><strong>📖 翻译：</strong> ${rec.translation || ''}</div>
                    <div><strong>🔑 核心词汇：</strong> ${renderKeywords(rec.keywords)}</div>
                    <div><strong>🎯 解题步骤：</strong> ${rec.solutionSteps || '—'}</div>
                    <div><strong>⚠️ 选项分析：</strong></div>
                    ${analysisHtml}
                    <div><strong>📚 考点小结：</strong> ${rec.summaryTip || '—'}</div>
                </div>
            </div>`;
        }).join('');
        document.querySelectorAll('.record-item').forEach(el => {
            const detail = el.querySelector('.record-detail');
            el.addEventListener('click', (e) => {
                if (e.target.tagName !== 'BUTTON' && !e.target.closest('button')) {
                    detail.style.display = detail.style.display === 'none' ? 'block' : 'none';
                }
            });
        });
    }

    clearHistoryBtn.onclick = async () => {
        if (confirm('清除所有刷题与考试记录？不可恢复。')) {
            await clearAllRecords();
            await updateAllStatsAndRecords();
        }
    };

    // ---------- 学习数据备份/恢复 ----------
    const exportDataBtn = document.getElementById('exportDataBtn');
    const importDataBtn = document.getElementById('importDataBtn');
    const importDataInput = document.getElementById('importDataInput');

    exportDataBtn.onclick = async () => {
        try {
            const records = await getAllRecords();
            const examHistory = await getAllExamHistory();
            const hashes = await getAllQuestionHashes();
            const categoryCount = await getCategoryCount();
            const vocabProgress = localStorage.getItem('toeic_vocab_progress') || '{}';
            const vocabData = localStorage.getItem('toeic_vocab_data') || '[]';

            const backup = {
                version: 1,
                exportDate: new Date().toISOString(),
                records: records,
                examHistory: examHistory,
                questionHashes: hashes,
                categoryCount: categoryCount,
                vocabProgress: JSON.parse(vocabProgress),
                vocabData: JSON.parse(vocabData),
            };

            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const dateStr = new Date().toISOString().slice(0, 10);
            a.download = `toeic_backup_${dateStr}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert(`备份成功！包含 ${records.length} 条刷题记录、${examHistory.length} 次考试记录`);
        } catch (err) {
            alert('备份失败: ' + err.message);
        }
    };

    importDataBtn.onclick = () => importDataInput.click();

    importDataInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
            const text = await file.text();
            const backup = JSON.parse(text);
            if (!backup.version || !backup.records) {
                throw new Error('不是有效的备份文件');
            }

            const msg = `确认恢复备份？\n\n` +
                `导出时间: ${backup.exportDate ? new Date(backup.exportDate).toLocaleString() : '未知'}\n` +
                `刷题记录: ${backup.records.length} 条\n` +
                `考试记录: ${(backup.examHistory || []).length} 次\n\n` +
                `注意：这将覆盖当前所有数据！`;

            if (!confirm(msg)) return;

            await clearAllRecords();
            for (const rec of backup.records) {
                await saveRecord(rec);
            }

            if (backup.examHistory && backup.examHistory.length > 0) {
                await clearExamHistory();
                for (const entry of backup.examHistory) {
                    await saveExamHistory(entry);
                }
            }

            if (backup.vocabProgress) {
                localStorage.setItem('toeic_vocab_progress', JSON.stringify(backup.vocabProgress));
            }
            if (backup.vocabData) {
                localStorage.setItem('toeic_vocab_data', JSON.stringify(backup.vocabData));
            }

            await updateAllStatsAndRecords();
            alert('数据恢复成功！');
        } catch (err) {
            alert('恢复失败: ' + err.message);
        }
        importDataInput.value = '';
    };

    refreshRecordBtn.onclick = () => updateAllStatsAndRecords();
    recordFilter.onchange = () => {
        window.currentCategoryFilter = null;
        renderRecords();
    };

    // ---------- 本地题库管理 ----------
    let localQuestionBank = [];
    const QUESTION_BANK_FILES = {
        builtIn: { file: 'question_bank.dat', label: '原题库' },
        ppt600: { file: 'question_bank_ppt600.dat', label: 'PPT600题库' }
    };

    function isBankSource() {
        return !!QUESTION_BANK_FILES[currentQuestionSource];
    }

    function getCurrentBankLabel() {
        return QUESTION_BANK_FILES[currentQuestionSource]?.label || '本地题库';
    }

    function syncQuestionSource(value) {
        currentQuestionSource = value;
        localStorage.setItem('toeic_question_source', value);
    }

    var _loadedBankKey = null;
    async function loadLocalQuestionBank(force) {
        const source = currentQuestionSource;
        const cfg = QUESTION_BANK_FILES[source] || QUESTION_BANK_FILES.builtIn;
        if (!force && _loadedBankKey === source && localQuestionBank.length > 0) {
            return localQuestionBank;
        }
        try {
            localQuestionBank = await DataDecrypt.fetchAndDecrypt(cfg.file, !!force);
            localQuestionBank = Array.isArray(localQuestionBank) ? localQuestionBank : [];
            _loadedBankKey = source;
            console.log('OK ' + cfg.label + ': ' + localQuestionBank.length);
            return localQuestionBank;
        } catch (error) {
            console.error('load bank fail:', error);
            localQuestionBank = [];
            _loadedBankKey = null;
            return [];
        }
    }


    async function handleQuestionSourceChange(value, autoStart) {
        syncQuestionSource(value);
        if (isBankSource()) {
            await loadLocalQuestionBank(false);
        } else {
            localQuestionBank = [];
            _loadedBankKey = null;
        }
    }

    // ============================================================
    //  模拟考试模式
    // ============================================================
    const EXAM_QUESTION_COUNT = 30;
    const EXAM_TIME_MINUTES = 10;
    let examQuestions = [];
    let examAnswers = {};
    let examTimer = null;
    let examTimeLeft = 0;
    let examStartTime = null;
    let examMode = 'ready'; // ready | active | results

    const examArea = document.getElementById('examArea');

    function renderExamPage() {
        if (examMode === 'active') {
            renderExamQuestion();
        } else if (examMode === 'results') {
            renderExamResults();
        } else {
            renderExamStart();
        }
    }

    function renderExamStart() {
        const total = statsTotal;
        const accuracy = statsAccuracy;
        const wrong = statsWrong;
        const bankCount = localQuestionBank.length || 0;
        examArea.innerHTML = `
            <div class="card">
                <div class="exam-start-card">
                    <div class="exam-icon">📝</div>
                    <div class="exam-title">模拟考试</div>
                    <div class="exam-desc">
                        标准商务英语 Part 5 模拟测试<br>
                        ${bankCount > 0 ? `${getCurrentBankLabel()} ${bankCount} 道题，随机抽取 ${Math.min(EXAM_QUESTION_COUNT, bankCount)} 题` : '暂无题库题目'} · 限时 ${EXAM_TIME_MINUTES} 分钟<br>
                        考试结束后 AI 分析不足与改进点
                    </div>
                    <div class="exam-stats">
                        <div class="exam-stat-item">
                            <div class="exam-stat-num">${total}</div>
                            <div class="exam-stat-label">总练习</div>
                        </div>
                        <div class="exam-stat-item">
                            <div class="exam-stat-num">${accuracy}%</div>
                            <div class="exam-stat-label">正确率</div>
                        </div>
                        <div class="exam-stat-item">
                            <div class="exam-stat-num">${bankCount}</div>
                            <div class="exam-stat-label">题库</div>
                        </div>
                    </div>
                    <button class="btn btn-primary" id="startExamBtn" style="width:100%; margin-top:8px;">
                        🚀 开始考试
                    </button>
                    <div style="margin-top:10px;">
                        <select id="examSourceSelect" style="width:100%; padding:8px; border-radius:8px; border:1px solid #e2e8f0; font-size:0.85rem;">
                            <option value="builtIn">📖 基础题库（220题）</option>
                            <option value="ppt600">🧾 PPT600题库（600题）</option>
                        </select>
                        <div id="examBankStatus" style="font-size:0.75rem; color:#64748b; margin-top:4px;"></div>
                    </div>
                    <button class="btn btn-secondary btn-sm" id="viewHistoryBtn" style="width:100%; margin-top:8px;">
                        📋 查看历史记录与成绩曲线
                    </button>
                    <div style="margin-top:12px; font-size:0.75rem; color:#94a3b8;">
                        题目从当前选择题库随机抽取，无需 API Key
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-label">📋 考试说明</div>
                <div style="font-size:0.82rem; line-height:1.7; color:#475569;">
                    <div style="margin-bottom:8px;">• 从题库随机抽取 <strong>${EXAM_QUESTION_COUNT} 道</strong> Part 5 单选题</div>
                    <div style="margin-bottom:8px;">• 时间限制 <strong>${EXAM_TIME_MINUTES} 分钟</strong>，到时自动交卷</div>
                    <div style="margin-bottom:8px;">• 可随时点击题目序号跳转答题</div>
                    <div style="margin-bottom:8px;">• 考试结束后 AI 分析不足与改进点</div>
                    <div style="margin-bottom:8px;">• 历史成绩记录与进步曲线</div>
                    <div>• 考试结果计入练习统计</div>
                </div>
            </div>
        `;
        document.getElementById('startExamBtn').onclick = startExam;
        document.getElementById('viewHistoryBtn').onclick = () => renderExamHistory();
        const examSourceSelect = document.getElementById('examSourceSelect');
        examSourceSelect.value = currentQuestionSource;
        examSourceSelect.addEventListener('change', async () => {
            await handleQuestionSourceChange(examSourceSelect.value, false);
            renderExamStart();
        });
        const examBankStatus = document.getElementById('examBankStatus');
        examBankStatus.textContent = localQuestionBank.length > 0 ? `已加载 ${localQuestionBank.length} 道题` : '题库未加载';
    }

    async function startExam() {
        await loadLocalQuestionBank(false);
        const actualCount = Math.min(EXAM_QUESTION_COUNT, localQuestionBank.length);
        if (actualCount < EXAM_QUESTION_COUNT) {
            if (!confirm(`题库仅有 ${localQuestionBank.length} 道题，不足 ${EXAM_QUESTION_COUNT} 道。是否用 ${actualCount} 道题开始考试？`)) return;
        }
        const records = await getAllRecords();
        const countMap = {};
        records.forEach(r => {
            const key = (r.questionText || '').substring(0, 60);
            countMap[key] = (countMap[key] || 0) + 1;
        });
        const sorted = localQuestionBank.map((q, i) => ({
            q, count: countMap[(q.questionText || '').substring(0, 60)] || 0, rand: Math.random()
        }));
        sorted.sort((a, b) => a.count !== b.count ? a.count - b.count : a.rand - b.rand);
        const selected = sorted.slice(0, Math.min(EXAM_QUESTION_COUNT, sorted.length)).map(s => s.q);
        const letters = ['A','B','C','D'];
        examQuestions = selected.map((q, idx) => {
            const q2 = {...q};
            if (!q2.options_cn) q2.options_cn = ['','','',''];
            if (!Array.isArray(q2.wrongOptionAnalysis)) q2.wrongOptionAnalysis = ['','','',''];
            if (!q2.keywords) q2.keywords = [];
            if (!q2.translation) q2.translation = '';
            if (!q2.solutionSteps) q2.solutionSteps = '';
            if (!q2.summaryTip) q2.summaryTip = '';
            if (!q2.category) q2.category = '未分类';
            if (q2.correctIndex !== undefined) {
                const correctIdx = q2.correctIndex;
                const indices = [0,1,2,3];
                for (let i = indices.length-1; i>0; i--) {
                    const j = Math.floor(Math.random()*(i+1));
                    [indices[i], indices[j]] = [indices[j], indices[i]];
                }
                q2.options = indices.map(i=>(q2.options||[])[i]);
                q2.options_cn = indices.map(i=>(q2.options_cn||['','','',''])[i]);
                q2.wrongOptionAnalysis = indices.map(i=>(q2.wrongOptionAnalysis||['','','',''])[i]);
                q2.correctAnswer = letters[indices.indexOf(correctIdx)];
                q2.correctIndex = indices.indexOf(correctIdx);
            }
            return { ...q2, originalIndex: idx };
        });
        examAnswers = {};
        examMode = 'active';
        examTimeLeft = EXAM_TIME_MINUTES * 60;
        examStartTime = Date.now();
        examCurrentIdx = 0;
        renderExamQuestion();
        startExamTimer();
    }

    function startExamTimer() {
        if (examTimer) clearInterval(examTimer);
        examTimer = setInterval(() => {
            examTimeLeft--;
            updateTimerDisplay();
            if (examTimeLeft <= 0) {
                clearInterval(examTimer);
                submitExam();
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const timerEl = document.querySelector('.time-display');
        const timerContainer = document.querySelector('.exam-timer');
        if (!timerEl) return;
        const mins = Math.floor(examTimeLeft / 60);
        const secs = examTimeLeft % 60;
        timerEl.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        if (examTimeLeft <= 60) {
            timerContainer.className = 'exam-timer danger';
        } else if (examTimeLeft <= 180) {
            timerContainer.className = 'exam-timer warning';

        const answered = Object.keys(examAnswers).length;
        const answeredCount = answered;

                <div class="exam-question-num">第 ${examCurrentIdx + 1} / ${examTotal} 题</div>

                <div style="display:flex; gap:8px; margin-top:12px;">
                    <button class="btn btn-secondary" id="examPrevBtn" style="flex:1" ${examCurrentIdx === 0 ? 'disabled' : ''}>◀ 上一题</button>
                    <button class="btn btn-primary" id="examNextBtn" style="flex:1">${examCurrentIdx === examTotal - 1 ? '提交考试 ▶' : '下一题 ▶'}</button>
                </div>
                <div class="exam-question-picker">${pickerHtml}</div>
            </div>
        `;

        document.getElementById('showTransBtn').onclick = () => {
            const el = document.getElementById('examTransArea');
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        };

        document.querySelectorAll('.option').forEach(opt => {
            opt.onclick = () => {
                const letter = opt.getAttribute('data-letter');
                examAnswers[examCurrentIdx] = letter;
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                updateQuestionPicker();
            };
        });

        document.getElementById('examPrevBtn').onclick = () => {
            if (examCurrentIdx > 0) {
                examCurrentIdx--;
                renderExamQuestion();
            }
        };

        document.getElementById('examNextBtn').onclick = () => {
            if (examCurrentIdx === examTotal - 1) {
                submitExam();
            } else {
                examCurrentIdx++;
                renderExamQuestion();
            }
        };

        document.querySelectorAll('.exam-q-btn').forEach(btn => {
            btn.onclick = () => {
                examCurrentIdx = parseInt(btn.getAttribute('data-idx'));
                renderExamQuestion();
            };
        });
    }

    function updateQuestionPicker() {
        document.querySelectorAll('.exam-q-btn').forEach(btn => {
            const idx = parseInt(btn.getAttribute('data-idx'));
            btn.className = 'exam-q-btn';
            if (idx === examCurrentIdx) btn.classList.add('current');
            else if (examAnswers[idx] !== undefined) btn.classList.add('answered');
            else btn.classList.add('unanswered');
        });
        const answered = Object.keys(examAnswers).length;
        const progressPct = Math.round((answered / examQuestions.length) * 100);
        const fill = document.querySelector('.exam-progress-fill');
        if (fill) fill.style.width = progressPct + '%';
        const countEl = document.querySelector('.exam-progress-text span:last-child');
        if (countEl) countEl.textContent = `${answered}/${examQuestions.length} 题已答`;
    }

    async function submitExam() {
        if (examTimer) clearInterval(examTimer);
        examMode = 'results';
        const timeSpent = Math.round((Date.now() - examStartTime) / 1000);
        const letters = ['A','B','C','D'];
        let correct = 0;
        const categoryStats = {};
        const examRecords = [];

        examQuestions.forEach((q, idx) => {
            const userAnswer = examAnswers[idx];
            const isCorrect = userAnswer === q.correctAnswer;
            if (isCorrect) correct++;
            const cat = q.category || '未分类';
            if (!categoryStats[cat]) categoryStats[cat] = { total: 0, correct: 0 };
            categoryStats[cat].total++;
            if (isCorrect) categoryStats[cat].correct++;
            examRecords.push({
                id: Date.now() + idx,
                timestamp: Date.now(),
                questionText: q.questionText,
                options: q.options,
                options_cn: q.options_cn,
                userAnswer: userAnswer || '',
                correctAnswer: q.correctAnswer,
                correct: isCorrect,
                category: q.category,
                translation: q.translation,
                keywords: q.keywords,
                solutionSteps: q.solutionSteps,
                wrongOptionAnalysis: q.wrongOptionAnalysis,
                summaryTip: q.summaryTip,
                examMode: true,
            });
        });

        for (const rec of examRecords) {
            await saveRecord(rec);

        const accuracy = Math.round((correct / examQuestions.length) * 100);

    // ---------- 考试历史记录 (IndexedDB) ----------

    async function saveExamHistory(entry) {
        if (!db) await openDB();
        const tx = db.transaction(EXAM_HISTORY_STORE, 'readwrite');
        tx.objectStore(EXAM_HISTORY_STORE).put(entry);
        return new Promise((resolve) => { tx.oncomplete = resolve; });
    }

    async function getAllExamHistory() {
        if (!db) await openDB();
        if (!db.objectStoreNames.contains(EXAM_HISTORY_STORE)) return [];
        return new Promise((resolve) => {
            const tx = db.transaction(EXAM_HISTORY_STORE, 'readonly');
            const req = tx.objectStore(EXAM_HISTORY_STORE).getAll();
            req.onsuccess = () => resolve(req.result || []);
        });
    }

    async function clearExamHistory() {
        if (!db) await openDB();
        if (!db.objectStoreNames.contains(EXAM_HISTORY_STORE)) return;
        const tx = db.transaction(EXAM_HISTORY_STORE, 'readwrite');
        tx.objectStore(EXAM_HISTORY_STORE).clear();
        return new Promise((resolve) => { tx.oncomplete = resolve; });
    }

    // ---------- 成绩曲线绘制 ----------
    async function renderScoreChart() {
        const history = await getAllExamHistory();
        const canvas = document.getElementById('scoreChart');
        const emptyMsg = document.getElementById('chartEmpty');
        if (!canvas) return;
        if (history.length === 0) {
            canvas.style.display = 'none';
            if (emptyMsg) emptyMsg.style.display = 'block';
            return;
        }
        canvas.style.display = 'block';
        if (emptyMsg) emptyMsg.style.display = 'none';

        history.sort((a, b) => a.timestamp - b.timestamp);
        const scores = history.map(h => h.accuracy);
        const labels = history.map((h, i) => `第${i + 1}次`);
        const times = history.map(h => {
            const m = Math.floor(h.timeSpent / 60);
            const s = h.timeSpent % 60;
            return `${m}:${String(s).padStart(2, '0')}`;
        });

        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);

        const W = rect.width;
        const H = rect.height;
        const padL = 40, padR = 20, padT = 20, padB = 40;
        const chartW = W - padL - padR;
        const chartH = H - padT - padB;

        ctx.clearRect(0, 0, W, H);

        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 1;
        for (let i = 0; i <= 5; i++) {
            const y = padT + chartH * (1 - i / 5);
            ctx.beginPath();
            ctx.moveTo(padL, y);
            ctx.lineTo(padL + chartW, y);
            ctx.stroke();
            ctx.fillStyle = '#94a3b8';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(`${i * 20}%`, padL - 6, y + 3);
        }

        const n = scores.length;
        const stepX = n > 1 ? chartW / (n - 1) : chartW;

        const gradient = ctx.createLinearGradient(0, padT, 0, padT + chartH);
        gradient.addColorStop(0, 'rgba(37, 99, 235, 0.3)');
        gradient.addColorStop(1, 'rgba(37, 99, 235, 0.02)');
        ctx.beginPath();
        scores.forEach((s, i) => {
            const x = padL + (n > 1 ? i * stepX : chartW / 2);
            const y = padT + chartH * (1 - s / 100);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        const lastX = padL + (n > 1 ? (n - 1) * stepX : chartW / 2);
        ctx.lineTo(lastX, padT + chartH);
        ctx.lineTo(padL, padT + chartH);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.beginPath();
        scores.forEach((s, i) => {
            const x = padL + (n > 1 ? i * stepX : chartW / 2);
            const y = padT + chartH * (1 - s / 100);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = '#2563eb';
        ctx.lineWidth = 2.5;
        ctx.lineJoin = 'round';
        ctx.stroke();

        scores.forEach((s, i) => {
            const x = padL + (n > 1 ? i * stepX : chartW / 2);
            const y = padT + chartH * (1 - s / 100);
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#2563eb';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x, y, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        });

        ctx.fillStyle = '#475569';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        scores.forEach((s, i) => {
            const x = padL + (n > 1 ? i * stepX : chartW / 2);
            ctx.fillText(labels[i], x, padT + chartH + 16);
            ctx.fillStyle = '#2563eb';
            ctx.font = 'bold 11px sans-serif';
            ctx.fillText(`${s}%`, x, padT + chartH * (1 - s / 100) - 8);
            ctx.fillStyle = '#94a3b8';
            ctx.font = '9px sans-serif';
            ctx.fillText(times[i], x, padT + chartH + 28);
            ctx.fillStyle = '#475569';
            ctx.font = '10px sans-serif';
        });
    }

    // ---------- AI 考后分析 ----------
    async function fetchAIAnalysis(categoryStats, accuracy, correct, total, timeSpent) {
        const card = document.getElementById('aiAnalysisCard');
        const content = document.getElementById('aiAnalysisContent');
        if (!card || !content) return;

        if (!apiKey) {
            content.innerHTML = '<div style="font-size:0.85rem; color:#94a3b8;">未配置 API Key，无法使用 AI 分析功能。请在设置页保存 API Key。</div>';
            card.style.display = 'block';
            return;
        }

        card.style.display = 'block';

        const history = await getAllExamHistory();
        history.sort((a, b) => a.timestamp - b.timestamp);
        let trendInfo = '';
        if (history.length >= 2) {
            const recent = history.slice(-5).map((h, i) => `第${history.length - 4 + i}次: ${h.accuracy}% (${h.correct}/${h.totalQuestions})`);
            trendInfo = `\n历史成绩趋势（最近5次）:\n${recent.join('\n')}`;
        }

        const catDetail = Object.entries(categoryStats).map(([cat, stat]) => {
            const pct = Math.round((stat.correct / stat.total) * 100);
            return `${cat}: ${stat.correct}/${stat.total} (${pct}%)`;
        }).join('\n');

        const prompt = `你是一位专业的商务英语考试辅导老师。请根据以下考试数据，给出详细的学习分析和改进建议。

本次考试数据：
- 正确率: ${accuracy}% (${correct}/${total})
- 用时: ${Math.floor(timeSpent/60)}分${timeSpent%60}秒
- 分类得分:
${catDetail}
${trendInfo}

请用中文回答，包含以下几个部分：
1. **总体评价**：对本次考试表现的简要评价
2. **薄弱考点**：指出最需要加强的考点类别（附具体建议）
3. **进步分析**：${history.length >= 2 ? '结合历史成绩分析是否有进步' : '这是第一次考试，后续会有进步趋势分析'}
4. **学习建议**：给出3条具体可执行的学习建议
5. **下次目标**：建议下次考试的正确率目标

请简洁清晰，避免过于笼统。`;

        try {
            const requestBody = {
                model: "doubao-seed-2.0-pro",
                stream: false,
                temperature: 0.5,
                max_tokens: 2000,
                messages: [{ role: "user", content: prompt }]
            };
            const resp = await fetch('https://ark.cn-beijing.volces.com/api/coding/v3/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });
            if (!resp.ok) throw new Error(`API ${resp.status}`);
            const data = await resp.json();
            let text = '';
            if (data.choices?.[0]?.message?.content) text = data.choices[0].message.content;
            else throw new Error('返回格式错误');

            const html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
            content.innerHTML = `<div style="font-size:0.85rem; line-height:1.7; color:#1e293b;">${html}</div>`;
        } catch (err) {
            content.innerHTML = `<div style="color:#dc2626; font-size:0.85rem;">AI 分析失败: ${err.message}</div><button class="btn btn-sm btn-outline" style="margin-top:8px;" id="retryAiBtn">重试</button>`;
            document.getElementById('retryAiBtn').onclick = () => fetchAIAnalysis(categoryStats, accuracy, correct, total, timeSpent);
        }
    }

            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padT + chartH * (1 - i / 5);
                ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + chartW, y); ctx.stroke();
                ctx.fillStyle = '#94a3b8'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
                ctx.fillText(`${i*20}%`, padL - 6, y + 3);
            }

            const gradient = ctx.createLinearGradient(0, padT, 0, padT + chartH);
            gradient.addColorStop(0, 'rgba(37, 99, 235, 0.3)');
            gradient.addColorStop(1, 'rgba(37, 99, 235, 0.02)');
            ctx.beginPath();
            scores.forEach((s, i) => {
                const x = padL + (n > 1 ? i * stepX : chartW / 2);
                const y = padT + chartH * (1 - s / 100);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.lineTo(padL + (n > 1 ? (n-1) * stepX : chartW/2), padT + chartH);
            ctx.lineTo(padL, padT + chartH);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();

            ctx.beginPath();
            scores.forEach((s, i) => {
                const x = padL + (n > 1 ? i * stepX : chartW / 2);
                const y = padT + chartH * (1 - s / 100);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();

            scores.forEach((s, i) => {
                const x = padL + (n > 1 ? i * stepX : chartW / 2);
                const y = padT + chartH * (1 - s / 100);
                ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2); ctx.fillStyle = '#2563eb'; ctx.fill();
                ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();
                ctx.fillStyle = '#2563eb'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(`${s}%`, x, y - 8);
            });

            const clearBtn = document.getElementById('clearExamHistoryBtn');
            if (clearBtn) {
                clearBtn.onclick = async () => {
                    if (confirm('确定清除所有考试历史记录？不可恢复。')) {
                        await clearExamHistory();
                        renderExamHistory();
                    }
                };
            }
        }

        document.getElementById('backToExamBtn').onclick = () => {
            examMode = 'ready';
            renderExamStart();
        };
    }

    // ---------- 刷题入口：按当前题目来源加载 ----------
    async function initQuiz() {
        await openDB();
        const savedSource = localStorage.getItem('toeic_question_source') || 'builtIn';
        syncQuestionSource(savedSource === 'ai' ? 'builtIn' : savedSource);
        await loadLocalQuestionBank(false);
        await updateAllStatsAndRecords();
        renderExamPage();
    }


    (async () => {
        await initQuiz();
    })();
</script>
