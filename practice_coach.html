<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🧠 刷题练习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f4f7fc;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px;
        }
        #app {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 32px 32px 24px 24px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 24px);
        }

        /* ===== 顶部栏 ===== */
        .header {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            padding: 16px 16px 14px;
            color: #fff;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }
        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-left a {
            background: rgba(255, 255, 255, 0.18);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .header-left a:active {
            background: rgba(255, 255, 255, 0.30);
        }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }
        .header h1 span { font-size: 20px; }
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .header-actions button {
            background: rgba(255, 255, 255, 0.18);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-actions button:active {
            background: rgba(255, 255, 255, 0.30);
        }
        .header-nav {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .header-nav a {
            flex: 1 1 calc(33.33% - 4px);
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            padding: 6px 6px;
            border-radius: 14px;
            font-size: 11px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .header-nav a:active {
            background: rgba(255, 255, 255, 0.30);
        }
        .header-nav .current {
            background: rgba(255, 255, 255, 0.35);
            font-weight: 600;
        }
        .stat-badge {
            background: rgba(255, 255, 255, 0.20);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ===== 页面容器 ===== */
        .page {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 16px 18px 20px;
            animation: fadeIn 0.30s ease;
            overflow-y: auto;
        }
        .page.active {
            display: flex;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== 通用卡片 ===== */
        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 16px 18px;
            margin-bottom: 14px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .card-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        /* ===== 设置区域 ===== */
        .key-input-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .key-input-group input {
            flex: 1;
            min-width: 120px;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 0.85rem;
            background: #f8fafc;
            color: #1e293b;
            outline: none;
            transition: border-color 0.2s;
        }
        .key-input-group input:focus {
            border-color: #2563eb;
            background: #fff;
        }
        select {
            padding: 8px 14px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-size: 0.85rem;
            color: #1e293b;
            outline: none;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .setting-row span {
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 500;
        }

        /* ===== 按钮 ===== */
        .btn {
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: transform 0.1s, opacity 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #2563eb; }
        .btn-primary:active { background: #1d4ed8; }
        .btn-success { background: #16a34a; }
        .btn-success:active { background: #15803d; }
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
        }
        .btn-secondary:active { background: #e2e8f0; }
        .btn-secondary:disabled { opacity: 0.4; }
        .btn-danger {
            background: #fee2e2;
            color: #dc2626;
        }
        .btn-warning {
            background: #fef9c3;
            color: #a16207;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #2563eb;
            color: #2563eb;
            padding: 6px 14px;
            font-size: 0.8rem;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
        }

        /* ===== 统计栏 ===== */
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .stats-item {
            font-size: 0.8rem;
            color: #475569;
        }
        .stats-item strong {
            font-size: 1rem;
            color: #1e293b;
        }

        /* ===== 题目区 ===== */
        .question-text {
            font-weight: 700;
            font-size: 1.05rem;
            line-height: 1.55;
            color: #0f172a;
            margin: 8px 0 16px;
        }
        .option {
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 40px;
            padding: 11px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            gap: 10px;
            align-items: center;
            transition: all 0.2s;
        }
        .option:active {
            background: #eff6ff;
        }
        .option.selected {
            background: #eff6ff;
            border-color: #2563eb;
        }
        .prefix {
            font-weight: 700;
            color: #2563eb;
            width: 26px;
            font-size: 0.9rem;
        }
        .option-text {
            font-size: 0.9rem;
            color: #1e293b;
        }

        /* ===== 反馈区 ===== */
        .feedback {
            background: #f8fafc;
            border-radius: 16px;
            padding: 14px;
            margin-top: 16px;
            border-left: 4px solid #2563eb;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .feedback strong { color: #0f172a; }
        .correct-badge {
            background: #dcfce7;
            color: #15803d;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .wrong-badge {
            background: #fee2e2;
            color: #dc2626;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .analysis-item {
            margin: 4px 0;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.8rem;
        }
        .analysis-item.correct-opt { background: #dcfce7; }

        /* ===== 选项翻译 ===== */
        .options-translation {
            margin-top: 12px;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 16px;
            font-size: 0.85rem;
        }
        .translation-item { margin: 6px 0; }

        /* ===== 词汇标签 ===== */
        .keyword-chip {
            display: inline-block;
            background: #eef2ff;
            color: #2563eb;
            border-radius: 20px;
            padding: 3px 10px;
            margin: 3px 4px 3px 0;
            font-size: 0.75rem;
        }
        .category-badge {
            display: inline-block;
            background: #f1f5f9;
            color: #64748b;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 6px;
        }

        /* ===== 记录区 ===== */
        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            align-items: center;
        }
        .stat-category {
            background: #eef2ff;
            color: #475569;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            cursor: pointer;
            display: inline-block;
            margin-right: 6px;
            margin-bottom: 6px;
        }
        .record-item {
            background: #f8fafc;
            border-left: 4px solid #2563eb;
            padding: 10px 12px;
            margin-bottom: 10px;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .record-item:active { background: #f1f5f9; }
        .record-item.correct-item { border-left-color: #16a34a; }
        .record-item.wrong-item { border-left-color: #f59e0b; }
        .record-question { font-weight: 600; font-size: 0.85rem; color: #1e293b; }
        .record-detail {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #e2e8f0;
            font-size: 0.8rem;
            line-height: 1.6;
        }

        /* ===== 底部导航 ===== */
        .bottom-nav {
            display: flex;
            border-top: 1px solid #f1f5f9;
            background: #fff;
            flex-shrink: 0;
        }
        .bottom-nav button {
            flex: 1;
            border: none;
            background: none;
            padding: 10px 0 12px;
            font-size: 12px;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-weight: 500;
        }
        .bottom-nav button .nav-icon { font-size: 20px; }
        .bottom-nav button.active {
            color: #2563eb;
            font-weight: 600;
        }
        .bottom-nav button.active::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: #2563eb;
            border-radius: 3px;
        }
        .bottom-nav button {
            position: relative;
        }
        .bottom-nav button:active { opacity: 0.6; }

        /* ===== 工具 ===== */
        .pool-info {
            font-size: 0.72rem;
            background: #eef2ff;
            color: #475569;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
        }
        .error-message {
            color: #dc2626;
            background: #fee2e2;
            padding: 10px;
            border-radius: 16px;
            margin-top: 12px;
            text-align: center;
            font-size: 0.85rem;
        }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

/* ===== 响应式 ===== */
        @media (max-width: 420px) {
            .header h1 { font-size: 16px; }
            .question-text { font-size: 0.95rem; }
            .option { padding: 9px 14px; }
        }

        /* ===== 模拟考试 ===== */
        .exam-timer {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff;
            padding: 12px 16px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 14px;
        }
        .exam-timer .time-display {
            font-size: 2rem;
            font-weight: 700;
            font-family: ui-monospace, monospace;
        }
        .exam-timer .time-label {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 2px;
        }
        .exam-timer.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .exam-timer.danger { background: linear-gradient(135deg, #ef4444, #dc2626); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
        .exam-progress {
            margin-bottom: 14px;
        }
        .exam-progress-bar {
            height: 6px;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 6px;
        }
        .exam-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            border-radius: 6px;
            transition: width 0.3s ease;
        }
        .exam-progress-text {
            font-size: 0.8rem;
            color: #64748b;
            display: flex;
            justify-content: space-between;
        }
        .exam-question-num {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 8px;
        }
        .exam-question-picker {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            margin-top: 12px;
            padding: 10px;
            background: #f8fafc;
            border-radius: 12px;
            max-height: 120px;
            overflow-y: auto;
        }
        .exam-q-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            background: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .exam-q-btn.current {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }
        .exam-q-btn.answered {
            background: #dcfce7;
            color: #15803d;
            border-color: #16a34a;
        }
        .exam-q-btn.wrong {
            background: #fee2e2;
            color: #dc2626;
            border-color: #dc2626;
        }
        .exam-q-btn.unanswered {
            background: #fff;
            color: #94a3b8;
        }
        .exam-q-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .exam-start-card {
            text-align: center;
            padding: 20px;
        }
        .exam-start-card .exam-icon {
            font-size: 64px;
            margin-bottom: 12px;
        }
        .exam-start-card .exam-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .exam-start-card .exam-desc {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .exam-start-card .exam-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
        }
        .exam-start-card .exam-stat-item {
            text-align: center;
        }
        .exam-start-card .exam-stat-num {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2563eb;
        }
        .exam-start-card .exam-stat-label {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 2px;
        }
        .exam-results-card {
            text-align: center;
            padding: 10px 0;
        }
        .exam-results-score {
            font-size: 4rem;
            font-weight: 800;
            color: #2563eb;
            line-height: 1;
        }
        .exam-results-label {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
        }
        .exam-results-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            margin: 12px 0;
        }
        .exam-results-bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 1s ease;
        }
        .exam-results-detail {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 16px 0;
        }
        .exam-results-stat {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
        }
        .exam-results-stat .stat-num {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e293b;
        }
        .exam-results-stat .stat-label {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 2px;
        }
        .exam-results-cat {
            background: #f8fafc;
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.82rem;
        }
        .exam-results-cat-name { font-weight: 500; color: #475569; }
        .exam-results-cat-score { font-weight: 600; }
        .exam-add-to-bank {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #eef2ff;
            color: #4f46e5;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 6px;
        }
        .exam-add-to-bank:active { background: #e0e7ff; }
        .exam-add-to-bank.added { background: #dcfce7; color: #15803d; }

        /* ===== 保存到题库通知 ===== */
        .save-bank-bar {
            display: none;
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 12px;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            border: 1px solid #fbbf24;
            animation: fadeIn 0.3s ease;
        }
        .save-bank-bar.show { display: flex; }
        .save-bank-info {
            font-size: 0.82rem;
            color: #92400e;
            flex: 1;
        }
        .save-bank-info strong { font-weight: 700; }
        .btn-save-bank {
            background: #d97706;
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .btn-save-bank:active { background: #b45309; }
    </style>

<meta name="theme-color" content="#2563eb">

<body>

<div id="app">

    <!-- ===== 顶部栏 ===== -->
    <header class="header">
        <div class="header-main">
            <div class="header-left">
                <a href="index.html" aria-label="返回主页">🏠</a>
                <h1><span>🧠</span> 刷题练习</h1>
            </div>
            <div class="header-actions">
                <button id="btnSettings" aria-label="设置">⚙️</button>
            </div>
        </div>
        <div class="header-nav">
<a href="vocabulary_app.html">📘 单词</a>
<a href="practice_coach.html" class="current">🧠 刷题</a>
<a href="vocab_story.html">📖 故事</a>
<a href="question_bank.html">🗄 题库</a>
<a href="question_batch_generator.html">📦 AI生成</a>
</div>
    </header>

    <!-- ===== 刷题页 ===== -->
    <div id="page-quiz" class="page active">

        <div class="card" id="statsCard">
            <div class="stats-row">
                <div class="stats-item">📚 总练习 <strong id="totalCount">0</strong></div>
                <div class="stats-item">✅ 正确率 <strong id="accuracyRate">0</strong>%</div>
                <div class="stats-item">❌ 错题 <strong id="wrongCount">0</strong></div>
            </div>
        </div>

        <div class="card">
            <div class="card-label">📚 题库来源</div>
            <div class="setting-row">
                <span>当前题库：</span>
                <select id="quickQuestionSource">
                    <option value="builtIn">📖 基础题库（220题）</option>

<script>
    // ---------- 页面导航 ----------
    const navBtns = document.querySelectorAll('.bottom-nav button');

        quiz: document.getElementById('page-quiz'),
        exam: document.getElementById('page-exam'),

    // ---------- IndexedDB ----------
    const DB_NAME = 'ToeicTrainerDB_final';
    const STORE_NAME = 'records';
    const META_STORE = 'metadata';
    const EXAM_HISTORY_STORE = 'exam_history';
    let db = null;

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 2);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                if (!db.objectStoreNames.contains(META_STORE)) {
                    const metaStore = db.createObjectStore(META_STORE, { keyPath: 'key' });
                    metaStore.put({ key: 'categoryCount', value: {} });
                    metaStore.put({ key: 'allQuestionHashes', value: [] });
                }
                if (!db.objectStoreNames.contains(EXAM_HISTORY_STORE)) {
                    db.createObjectStore(EXAM_HISTORY_STORE, { keyPath: 'id' });
                }
            };
            request.onsuccess = (e) => { db = e.target.result; resolve(db); };
            request.onerror = (e) => reject(e.target.error);
        });
    }

    async function saveRecord(record) {
        if (!db) await openDB();
        const tx = db.transaction([STORE_NAME, META_STORE], 'readwrite');
        await tx.objectStore(STORE_NAME).put(record);
        const metaStore = tx.objectStore(META_STORE);
        const catCount = (await metaStore.get('categoryCount'))?.value || {};
        const cat = record.category || '未分类';
        catCount[cat] = (catCount[cat] || 0) + 1;
        await metaStore.put({ key: 'categoryCount', value: catCount });
        const hash = record.questionText.slice(0, 60);
        let hashes = (await metaStore.get('allQuestionHashes'))?.value || [];
        if (!hashes.includes(hash)) hashes.push(hash);
        if (hashes.length > 200) hashes = hashes.slice(-200);
        await metaStore.put({ key: 'allQuestionHashes', value: hashes });
        return new Promise((resolve) => { tx.oncomplete = resolve; });
    }

    async function getAllRecords() {
        if (!db) await openDB();
        return new Promise((resolve) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const req = tx.objectStore(STORE_NAME).getAll();
            req.onsuccess = () => resolve(req.result || []);
        });
    }

    async function clearAllRecords() {
        if (!db) await openDB();
        const tx = db.transaction([STORE_NAME, META_STORE], 'readwrite');
        await tx.objectStore(STORE_NAME).clear();
        await tx.objectStore(META_STORE).put({ key: 'categoryCount', value: {} });
        await tx.objectStore(META_STORE).put({ key: 'allQuestionHashes', value: [] });
        return new Promise((resolve) => { tx.oncomplete = resolve; });
    }

    async function getCategoryCount() {
        if (!db) await openDB();
        const tx = db.transaction(META_STORE, 'readonly');
        const res = await tx.objectStore(META_STORE).get('categoryCount');
        return res?.value || {};
    }

    async function getAllQuestionHashes() {
        if (!db) await openDB();
        const tx = db.transaction(META_STORE, 'readonly');
        const res = await tx.objectStore(META_STORE).get('allQuestionHashes');
        return res?.value || [];
    }

    async function clearQuestionHashes() {
        if (!db) await openDB();
        const tx = db.transaction(META_STORE, 'readwrite');
        await tx.objectStore(META_STORE).put({ key: 'allQuestionHashes', value: [] });
        return new Promise((resolve) => { tx.oncomplete = resolve; });
    }

    async function saveQuestionHash(hash) {
        if (!db) await openDB();
        const tx = db.transaction(META_STORE, 'readwrite');
        const hashes = (await tx.objectStore(META_STORE).get('allQuestionHashes'))?.value || [];
        if (!hashes.includes(hash)) hashes.push(hash);
        if (hashes.length > 200) hashes = hashes.slice(-200);
        await tx.objectStore(META_STORE).put({ key: 'allQuestionHashes', value: hashes });
        return new Promise((resolve) => { tx.oncomplete = resolve; });
    }

    // ---------- 全局变量 ----------
    const DEFAULT_API_KEY = '';

    const ALL_CATEGORIES = ['词性判断', '动词时态', '非谓语动词', '介词搭配', '虚拟语气', '倒装结构', '独立主格', '词汇搭配', '代词指代', '比较级', '词汇辨析', '定语从句', '连词辨析', '情态动词', '主谓一致', '名词单复数', '平行结构', '数量词辨析'];
    const BUSINESS_SCENES = ['邮件通讯', '例会纪要', '季度财务报告', '人事调动', '产品采购', '供应链延迟', '合约谈判', '差旅报销', '客户服务', '市场策略', '物流管理', '投资分析', '企业并购', '员工培训', '预算审批', '设备租赁', '国际运输', '展会策划', '绩效考核', '危机公关'];

    let wordDatabase = [];
    async function loadWordDatabase() {
        try {
            wordDatabase = await DataDecrypt.fetchAndDecrypt('word_database.dat');
            console.log(`✅ 已加载 ${wordDatabase.length} 个单词`);
        } catch (error) {
            console.error('加载单词数据库失败:', error);
            wordDatabase = [
                { word: "increase", pos: ["名", "动"], meaning: "增加" },
                { word: "include", pos: ["动"], meaning: "包含" },
                { word: "currently", pos: ["副"], meaning: "目前" },
                { word: "advertising", pos: ["名"], meaning: "广告，宣传" },
                { word: "charge", pos: ["动", "名"], meaning: "收费，充电，指责；费用，责任" }
            ];
        }
    }

    function getRandomWords(count) {
        if (wordDatabase.length === 0) return [];
        const shuffled = [...wordDatabase];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        const selected = [];
        const usedPos = new Set();
        for (const word of shuffled) {
            if (selected.length >= count) break;
            const hasNewPos = word.pos.some(pos => !usedPos.has(pos));
            if (hasNewPos || Math.random() < 0.3) {
                selected.push(word);
                word.pos.forEach(pos => usedPos.add(pos));
            }
        }
        if (selected.length < count) {
            const remaining = shuffled.filter(w => !selected.includes(w));
            selected.push(...remaining.slice(0, count - selected.length));
        }
        return selected;
    }

    function generateWordBasedPrompt() {
        const randomWords = getRandomWords(20);
        const wordList = randomWords.map(w => {
            const posStr = Array.isArray(w.pos) ? w.pos.join('/') : w.pos || '未知';
            const synonyms = w.synonyms ? ` (同义词: ${Array.isArray(w.synonyms) ? w.synonyms.join(', ') : w.synonyms})` : '';
            const antonyms = w.antonyms ? ` (反义词: ${Array.isArray(w.antonyms) ? w.antonyms.join(', ') : w.antonyms})` : '';
            return `${w.word} (${posStr}): ${w.meaning}${synonyms}${antonyms}`;
        }).join('; ');
        return `以下单词请优先在题目中使用，确保题目多样性: ${wordList}`;
    }

    function renderKeywords(keywords) {
        if (!keywords || !Array.isArray(keywords)) return '—';
        if (keywords.length > 0 && typeof keywords[0] === 'object' && keywords[0].word) {
            return keywords.map(kw => `<span class="keyword-chip">${kw.word} (${kw.pos}) ${kw.meaning}</span>`).join('');
        }
        return keywords.map(kw => `<span class="keyword-chip">${kw}</span>`).join('');
    }

    async function updateAllStatsAndRecords() {
        const records = await getAllRecords();
        const total = records.length;
        const correctNum = records.filter(r => r.correct === true).length;
        const wrongNum = total - correctNum;
        const accuracy = total === 0 ? 0 : Math.round((correctNum / total) * 100);
        totalSpan.innerText = total;
        accuracySpan.innerText = accuracy;
        wrongCountSpan.innerText = wrongNum;

        const categoryStats = {};
        records.forEach(rec => {
            const cat = rec.category || '未分类';
            if (!categoryStats[cat]) categoryStats[cat] = { total: 0, correct: 0 };
            categoryStats[cat].total++;
            if (rec.correct) categoryStats[cat].correct++;
        });
        categoryStatsDiv.innerHTML = Object.entries(categoryStats).map(([cat, stat]) => {
            const percent = stat.total === 0 ? 0 : Math.round((stat.correct / stat.total) * 100);
            return `<span class="stat-category" data-cat="${cat}">${cat} : ${stat.correct}/${stat.total} (${percent}%)</span>`;
        }).join('');
        document.querySelectorAll('.stat-category').forEach(el => {
            el.onclick = () => {
                window.currentCategoryFilter = el.getAttribute('data-cat');
                renderRecords();
            };
        });
        await renderRecords();
    }

    async function renderRecords() {
        const records = await getAllRecords();
        const filterValue = recordFilter.value;
        let filtered = records;
        if (filterValue === 'wrong') filtered = records.filter(r => r.correct === false);
        if (filterValue === 'correct') filtered = records.filter(r => r.correct === true);
        if (window.currentCategoryFilter && window.currentCategoryFilter !== 'all') {
            filtered = filtered.filter(r => (r.category || '未分类') === window.currentCategoryFilter);
        } else {
            window.currentCategoryFilter = null;
        }
        filtered.sort((a, b) => b.timestamp - a.timestamp);
        if (filtered.length === 0) {
            recordListContainer.innerHTML = '<div style="text-align:center; padding:40px 20px; color:#94a3b8;">暂无记录</div>';
            return;
        }
        const letters = ['A','B','C','D'];
        recordListContainer.innerHTML = filtered.map(rec => {
            let analysisHtml = '';
            if (Array.isArray(rec.wrongOptionAnalysis) && rec.wrongOptionAnalysis.length === 4 && Array.isArray(rec.options) && rec.options.length === 4) {
                analysisHtml = rec.wrongOptionAnalysis.map((a, i) => {
                    const isCorrectOpt = (letters[i] === rec.correctAnswer);
                    return `<div class="analysis-item ${isCorrectOpt ? 'correct-opt' : ''}">${isCorrectOpt ? '✅' : '❌'} <strong>${letters[i]}. ${rec.options[i]}</strong>: ${a}</div>`;
                }).join('');
            } else {
                analysisHtml = `<div>⚠️ 选项分析：${rec.wrongOptionAnalysis || '—'}</div>`;
            }
            return `
            <div class="record-item ${rec.correct ? 'correct-item' : 'wrong-item'}" data-id="${rec.id}">
                <div class="record-question">
                    ${rec.correct ? '✅' : '❌'} ${rec.questionText.length > 60 ? rec.questionText.slice(0,60)+'…' : rec.questionText}
                    <span class="category-badge">${rec.category || '未分类'}</span>
                </div>
                <div style="font-size:0.75rem; margin-top:4px; color:#64748b;">你的答案: ${rec.userAnswer} | 正确答案: ${rec.correctAnswer}</div>
                <div class="record-detail" style="display:none;">
                    <div><strong>📖 翻译：</strong> ${rec.translation || ''}</div>
                    <div><strong>🔑 核心词汇：</strong> ${renderKeywords(rec.keywords)}</div>
                    <div><strong>🎯 解题步骤：</strong> ${rec.solutionSteps || '—'}</div>
                    <div><strong>⚠️ 选项分析：</strong></div>
                    ${analysisHtml}
                    <div><strong>📚 考点小结：</strong> ${rec.summaryTip || '—'}</div>
                </div>
            </div>`;
        }).join('');
        document.querySelectorAll('.record-item').forEach(el => {
            const detail = el.querySelector('.record-detail');
            el.addEventListener('click', (e) => {
                if (e.target.tagName !== 'BUTTON' && !e.target.closest('button')) {
                    detail.style.display = detail.style.display === 'none' ? 'block' : 'none';
                }
            });
        });
    }

    clearHistoryBtn.onclick = async () => {
        if (confirm('清除所有练习记录？不可恢复。')) {
            await clearAllRecords();

            await clearQuestionHashes();
            alert('题目缓存已清除');

    // ---------- 学习数据备份/恢复 ----------
    const exportDataBtn = document.getElementById('exportDataBtn');
    const importDataBtn = document.getElementById('importDataBtn');
    const importDataInput = document.getElementById('importDataInput');

    exportDataBtn.onclick = async () => {
        try {
            const records = await getAllRecords();
            const examHistory = await getAllExamHistory();
            const hashes = await getAllQuestionHashes();
            const categoryCount = await getCategoryCount();
            const vocabProgress = localStorage.getItem('toeic_vocab_progress') || '{}';
            const vocabData = localStorage.getItem('toeic_vocab_data') || '[]';
            const arkKey = localStorage.getItem('toeic_ark_key') || '';

            const backup = {
                version: 1,
                exportDate: new Date().toISOString(),
                records: records,
                examHistory: examHistory,
                questionHashes: hashes,
                categoryCount: categoryCount,
                vocabProgress: JSON.parse(vocabProgress),
                vocabData: JSON.parse(vocabData),
                arkKey: arkKey,
            };

            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const dateStr = new Date().toISOString().slice(0, 10);
            a.download = `toeic_backup_${dateStr}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert(`备份成功！包含 ${records.length} 条刷题记录、${examHistory.length} 次考试记录`);
        } catch (err) {
            alert('备份失败: ' + err.message);
        }
    };

    importDataBtn.onclick = () => importDataInput.click();

    importDataInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
            const text = await file.text();
            const backup = JSON.parse(text);
            if (!backup.version || !backup.records) {
                throw new Error('不是有效的备份文件');
            }

            const msg = `确认恢复备份？\n\n` +
                `导出时间: ${backup.exportDate ? new Date(backup.exportDate).toLocaleString() : '未知'}\n` +
                `刷题记录: ${backup.records.length} 条\n` +
                `考试记录: ${(backup.examHistory || []).length} 次\n\n` +
                `注意：这将覆盖当前所有数据！`;

            if (!confirm(msg)) return;

            await clearAllRecords();
            for (const rec of backup.records) {
                await saveRecord(rec);
            }

            if (backup.examHistory && backup.examHistory.length > 0) {
                await clearExamHistory();
                for (const entry of backup.examHistory) {
                    await saveExamHistory(entry);
                }
            }

            if (backup.vocabProgress) {
                localStorage.setItem('toeic_vocab_progress', JSON.stringify(backup.vocabProgress));
            }
            if (backup.vocabData) {
                localStorage.setItem('toeic_vocab_data', JSON.stringify(backup.vocabData));

    // ---------- 批量生成 ----------
    async function generateBatch(count) {
        if (!apiKey) throw new Error('请先保存 API Key');
        const difficultyHint = difficultySelect.value;
        const recentHashes = await getAllQuestionHashes();
        const recentHashHint = recentHashes.slice(-60).join('；');
        const wordPrompt = generateWordBasedPrompt();
        const selectedScenes = [...BUSINESS_SCENES]
            .sort(() => Math.random() - 0.5)
            .slice(0, 10)
            .join('、');

        const prompt = `你是资深商务英语出题专家。请一次性生成 ${count} 道不同的 Part 5 语法/词汇单选题，输出为一个JSON数组，不要有任何额外文本。

全局要求：
- 难度均为: ${difficultyHint}
- 商务场景：从以下列表中随机选择，确保场景多样性：${selectedScenes}
- 考点必须均衡覆盖，尤其优先考虑低频考点（倒装结构、独立主格、虚拟语气、平行结构、词汇辨析等）。
- 避免与以下最近已出题目的题干重复（前80字符）: ${recentHashHint}
- ${wordPrompt}
- 每道题的结构必须包含以下全部字段（JSON 字段名必须完全一致）：
{
  "id": "toeic_p5_序号（自增三位数，如001,002）",
  "part": "Part5",
  "category": "考点类别（必须从以下选取：词性判断/动词时态/非谓语动词/介词搭配/虚拟语气/倒装结构/独立主格/词汇搭配/代词指代/比较级/词汇辨析/定语从句/连词辨析/情态动词/主谓一致/名词单复数/平行结构/数量词辨析）",
  "difficulty": 1-5的整数,
  "questionText": "英文题干（含空格）",
  "options": ["A选项文本", "B选项文本", "C选项文本", "D选项文本"],
  "options_cn": ["A选项中文注释（词性/用法说明）", "B选项中文注释", "C选项中文注释", "D选项中文注释"],
  "correctIndex": 0-3的整数（0=A,1=B,2=C,3=D）",
  "correctAnswer": "A或B或C或D（与correctIndex对应）",
  "translation": "题目完整中文翻译",
  "keywords": [{"word":"单词", "pos":"词性", "meaning":"中文释义"}],
  "solutionSteps": "分步解题步骤，每步用数字标注，用换行符分隔",
  "wrongOptionAnalysis": ["A选项错误原因", "B选项错误原因", "C选项错误原因", "D选项错误原因"],
  "summaryTip": "考点小结/记忆技巧"
}

特别注意：
1. 题目内容必须多样化，避免相似的语法结构或词汇选择
2. 选项设计要有区分度，避免明显的干扰项
3. wrongOptionAnalysis 数组中每个元素是对应选项的错误原因分析，不要出现A/B/C/D字母前缀
4. 正确选项的 wrongOptionAnalysis 分析应说明"这是正确选项"或"正确拼写/用法"
5. correctIndex 随机分布，不要集中在某个位置
6. 关键词尽量使用提供的单词数据库中的词汇
7. solutionSteps 中用换行符 \\n 分隔各步骤
8. difficulty 难度分布建议：L1-L3占70%，L4-L5占30%
9. 返回格式严格为: [ {...}, {...}, ... ] 只输出数组，不要用markdown代码块包裹

开始生成。`;

        const requestBody = {
            model: "YOUR_MODEL_ENDPOINT",
            stream: false,
            temperature: 0.4,
            max_output_tokens: Math.min(2800 + count * 200, 8000),
            input: [{ role: "user", content: [{ type: "input_text", text: prompt }] }]
        };
        const resp = await fetch('https://ark.cn-beijing.volces.com/api/v3/responses', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        });
        if (!resp.ok) throw new Error(`API ${resp.status}`);
        const data = await resp.json();
        let raw = '';
        if (data.output?.[0]?.content?.[0]?.text) raw = data.output[0].content[0].text;
        else if (data.output?.choices?.[0]?.message?.content) raw = data.output.choices[0].message.content;
        else if (data.choices?.[0]?.message?.content) raw = data.choices[0].message.content;
        else throw new Error('返回格式错误');
        let cleaned = raw.trim();
        const arrayMatch = cleaned.match(/\[[\s\S]*\]/);
        if (arrayMatch) cleaned = arrayMatch[0];
        let questions = JSON.parse(cleaned);
        if (!Array.isArray(questions)) throw new Error('返回不是数组');
        return questions.map(q => {
            if (!q.options_cn) q.options_cn = ['','','',''];
            if (!Array.isArray(q.wrongOptionAnalysis)) q.wrongOptionAnalysis = ['','','',''];
            if (!q.keywords) q.keywords = [];
            if (!q.translation) q.translation = '';
            if (!q.solutionSteps) q.solutionSteps = '';
            if (!q.summaryTip) q.summaryTip = '';
            if (!q.category) q.category = '未分类';
            return q;
        });
    }

    function shuffleQuestion(question) {
        const indices = [0,1,2,3];
        for (let i = indices.length-1; i>0; i--) {
            const j = Math.floor(Math.random()*(i+1));
            [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        const newOptions = indices.map(i=>question.options[i]);
        const newOptionsCn = indices.map(i=>question.options_cn[i]);
        const newWrongAnalysis = indices.map(i=>question.wrongOptionAnalysis[i]);
        const newCorrectIndex = indices.indexOf(question.correctIndex);
        const newCorrectLetter = String.fromCharCode(65+newCorrectIndex);
        return {...question, options:newOptions, options_cn:newOptionsCn, wrongOptionAnalysis:newWrongAnalysis, correctAnswer:newCorrectLetter, correctIndex:newCorrectIndex};
    }

    async function resetAndFillPool(targetCount) {
        questionPool = [];
        isRefilling = false;
        poolReady = false;
        if (wordDatabase.length === 0) await loadWordDatabase();

        if (isBankSource()) {
            if (localQuestionBank.length === 0) await loadLocalQuestionBank();
            if (localQuestionBank.length > 0) {
                const shuffled = [...localQuestionBank]
                    .sort(() => Math.random() - 0.5)
                    .slice(0, targetCount)
                    .map(q => {
                        const letters = ['A','B','C','D'];
                        const q2 = {...q};
                        if (q2.correctIndex !== undefined) {
                            const correctIdx = q2.correctIndex;
                            const indices = [0,1,2,3];
                            for (let i = indices.length-1; i>0; i--) {
                                const j = Math.floor(Math.random()*(i+1));
                                [indices[i], indices[j]] = [indices[j], indices[i]];
                            }
                            q2.options = indices.map(i=>q2.options[i]);
                            q2.options_cn = indices.map(i=>(q2.options_cn||['','','',''])[i]);
                            q2.wrongOptionAnalysis = indices.map(i=>(q2.wrongOptionAnalysis||['','','',''])[i]);
                            q2.correctAnswer = letters[indices.indexOf(correctIdx)];
                            q2.correctIndex = indices.indexOf(correctIdx);
                        }
                        return q2;
                    });
                questionPool.push(...shuffled);
                poolReady = true;
                return;
            }
        }

        const newQuestions = await generateBatch(targetCount);
        const shuffledBatch = newQuestions.map(q => shuffleQuestion(q));
        questionPool.push(...shuffledBatch);
        poolReady = true;
        allGeneratedQuestions.push(...newQuestions);
        for (const q of newQuestions) {
            const hash = q.questionText.substring(0, 80).replace(/\s+/g, ' ');
            await saveQuestionHash(hash);
        }
    }

    async function backgroundRefill(targetCount) {
        if (isRefilling) return;
        isRefilling = true;
        try {
            const newQuestions = await generateBatch(targetCount);
            const shuffledBatch = newQuestions.map(q => shuffleQuestion(q));
            questionPool.push(...shuffledBatch);
            allGeneratedQuestions.push(...newQuestions);
            for (const q of newQuestions) {
                const hash = q.questionText.substring(0, 80).replace(/\s+/g, ' ');
                await saveQuestionHash(hash);
            }
            console.log(`✅ 后台补充了 ${newQuestions.length} 道新题目`);
        } catch (err) {
            console.error("后台补充失败", err);
        } finally {
            isRefilling = false;
        }
    }

    function getNextQuestionFromPool() {
        if (questionPool.length === 0) {
            throw new Error("题目池已空，请点击「开始刷题」重新生成");
        }
        const q = questionPool.shift();
        if (isBankSource()) return q;
        const targetBatch = parseInt(batchSizeSelect.value);
        const currentPoolSize = questionPool.length;
        if (currentPoolSize < Math.max(3, Math.floor(targetBatch / 4))) {
            backgroundRefill(targetBatch).catch(e=>console.error);
        } else if (currentPoolSize < Math.max(5, Math.floor(targetBatch / 2))) {
            setTimeout(() => {
                if (questionPool.length < Math.max(3, Math.floor(targetBatch / 3))) {
                    backgroundRefill(targetBatch).catch(e=>console.error);
                }
            }, 1000);
        }
        return q;
    }

    async function startExam() {
        await loadLocalQuestionBank(true);
        const actualCount = Math.min(EXAM_QUESTION_COUNT, localQuestionBank.length);
        if (actualCount < EXAM_QUESTION_COUNT) {
            if (!confirm(`题库仅有 ${localQuestionBank.length} 道题，不足 ${EXAM_QUESTION_COUNT} 道。是否用 ${actualCount} 道题开始考试？`)) return;
        }
        const pool = [...localQuestionBank].sort(() => Math.random() - 0.5);
        const selected = pool.slice(0, Math.min(EXAM_QUESTION_COUNT, pool.length));
        const letters = ['A','B','C','D'];
        examQuestions = selected.map((q, idx) => {
            const q2 = {...q};
            if (!q2.options_cn) q2.options_cn = ['','','',''];
            if (!Array.isArray(q2.wrongOptionAnalysis)) q2.wrongOptionAnalysis = ['','','',''];
            if (!q2.keywords) q2.keywords = [];
            if (!q2.translation) q2.translation = '';
            if (!q2.solutionSteps) q2.solutionSteps = '';
            if (!q2.summaryTip) q2.summaryTip = '';
            if (!q2.category) q2.category = '未分类';
            if (q2.correctIndex !== undefined) {
                const correctIdx = q2.correctIndex;
                const indices = [0,1,2,3];
                for (let i = indices.length-1; i>0; i--) {
                    const j = Math.floor(Math.random()*(i+1));
                    [indices[i], indices[j]] = [indices[j], indices[i]];
                }
                q2.options = indices.map(i=>(q2.options||[])[i]);
                q2.options_cn = indices.map(i=>(q2.options_cn||['','','',''])[i]);
                q2.wrongOptionAnalysis = indices.map(i=>(q2.wrongOptionAnalysis||['','','',''])[i]);
                q2.correctAnswer = letters[indices.indexOf(correctIdx)];
                q2.correctIndex = indices.indexOf(correctIdx);
            }
            return { ...q2, originalIndex: idx };
        });
        examAnswers = {};
        examMode = 'active';
        examTimeLeft = EXAM_TIME_MINUTES * 60;
        examStartTime = Date.now();
        examCurrentIdx = 0;
        renderExamQuestion();
        startExamTimer();
    }

    async function saveExamHistory(entry) {
        if (!db) await openDB();
        const tx = db.transaction(EXAM_HISTORY_STORE, 'readwrite');
        tx.objectStore(EXAM_HISTORY_STORE).put(entry);
        return new Promise((resolve) => { tx.oncomplete = resolve; });
    }

    async function getAllExamHistory() {
        if (!db) await openDB();
        if (!db.objectStoreNames.contains(EXAM_HISTORY_STORE)) return [];
        return new Promise((resolve) => {
            const tx = db.transaction(EXAM_HISTORY_STORE, 'readonly');
            const req = tx.objectStore(EXAM_HISTORY_STORE).getAll();
            req.onsuccess = () => resolve(req.result || []);
        });
    }

    async function clearExamHistory() {
        if (!db) await openDB();
        if (!db.objectStoreNames.contains(EXAM_HISTORY_STORE)) return;
        const tx = db.transaction(EXAM_HISTORY_STORE, 'readwrite');
        tx.objectStore(EXAM_HISTORY_STORE).clear();
        return new Promise((resolve) => { tx.oncomplete = resolve; });
    }

    // ---------- 成绩曲线绘制 ----------
    async function renderScoreChart() {
        const history = await getAllExamHistory();
        const canvas = document.getElementById('scoreChart');
        const emptyMsg = document.getElementById('chartEmpty');
        if (!canvas) return;
        if (history.length === 0) {
            canvas.style.display = 'none';
            if (emptyMsg) emptyMsg.style.display = 'block';
            return;
        }
        canvas.style.display = 'block';
        if (emptyMsg) emptyMsg.style.display = 'none';

        history.sort((a, b) => a.timestamp - b.timestamp);
        const scores = history.map(h => h.accuracy);
        const labels = history.map((h, i) => `第${i + 1}次`);
        const times = history.map(h => {
            const m = Math.floor(h.timeSpent / 60);
            const s = h.timeSpent % 60;
            return `${m}:${String(s).padStart(2, '0')}`;
        });

        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);

        const W = rect.width;
        const H = rect.height;
        const padL = 40, padR = 20, padT = 20, padB = 40;
        const chartW = W - padL - padR;
        const chartH = H - padT - padB;

        ctx.clearRect(0, 0, W, H);

        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 1;
        for (let i = 0; i <= 5; i++) {
            const y = padT + chartH * (1 - i / 5);
            ctx.beginPath();
            ctx.moveTo(padL, y);
            ctx.lineTo(padL + chartW, y);
            ctx.stroke();
            ctx.fillStyle = '#94a3b8';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(`${i * 20}%`, padL - 6, y + 3);
        }

        const n = scores.length;
        const stepX = n > 1 ? chartW / (n - 1) : chartW;

        const gradient = ctx.createLinearGradient(0, padT, 0, padT + chartH);
        gradient.addColorStop(0, 'rgba(37, 99, 235, 0.3)');
        gradient.addColorStop(1, 'rgba(37, 99, 235, 0.02)');
        ctx.beginPath();
        scores.forEach((s, i) => {
            const x = padL + (n > 1 ? i * stepX : chartW / 2);
            const y = padT + chartH * (1 - s / 100);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        const lastX = padL + (n > 1 ? (n - 1) * stepX : chartW / 2);
        ctx.lineTo(lastX, padT + chartH);
        ctx.lineTo(padL, padT + chartH);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.beginPath();
        scores.forEach((s, i) => {
            const x = padL + (n > 1 ? i * stepX : chartW / 2);
            const y = padT + chartH * (1 - s / 100);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = '#2563eb';
        ctx.lineWidth = 2.5;
        ctx.lineJoin = 'round';
        ctx.stroke();

        scores.forEach((s, i) => {
            const x = padL + (n > 1 ? i * stepX : chartW / 2);
            const y = padT + chartH * (1 - s / 100);
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#2563eb';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x, y, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        });

        ctx.fillStyle = '#475569';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        scores.forEach((s, i) => {
            const x = padL + (n > 1 ? i * stepX : chartW / 2);
            ctx.fillText(labels[i], x, padT + chartH + 16);
            ctx.fillStyle = '#2563eb';
            ctx.font = 'bold 11px sans-serif';
            ctx.fillText(`${s}%`, x, padT + chartH * (1 - s / 100) - 8);
            ctx.fillStyle = '#94a3b8';
            ctx.font = '9px sans-serif';
            ctx.fillText(times[i], x, padT + chartH + 28);
            ctx.fillStyle = '#475569';
            ctx.font = '10px sans-serif';
        });
    }

    // ---------- AI 考后分析 ----------
    async function fetchAIAnalysis(categoryStats, accuracy, correct, total, timeSpent) {
        const card = document.getElementById('aiAnalysisCard');
        const content = document.getElementById('aiAnalysisContent');
        if (!card || !content) return;

        if (!apiKey) {
            content.innerHTML = '<div style="font-size:0.85rem; color:#94a3b8;">未配置 API Key，无法使用 AI 分析功能。请在设置页保存 API Key。</div>';
            card.style.display = 'block';
            return;
        }

        card.style.display = 'block';

        const history = await getAllExamHistory();
        history.sort((a, b) => a.timestamp - b.timestamp);
        let trendInfo = '';
        if (history.length >= 2) {
            const recent = history.slice(-5).map((h, i) => `第${history.length - 4 + i}次: ${h.accuracy}% (${h.correct}/${h.totalQuestions})`);
            trendInfo = `\n历史成绩趋势（最近5次）:\n${recent.join('\n')}`;
        }

        const catDetail = Object.entries(categoryStats).map(([cat, stat]) => {
            const pct = Math.round((stat.correct / stat.total) * 100);
            return `${cat}: ${stat.correct}/${stat.total} (${pct}%)`;
        }).join('\n');

        const prompt = `你是一位专业的商务英语考试辅导老师。请根据以下考试数据，给出详细的学习分析和改进建议。

本次考试数据：
- 正确率: ${accuracy}% (${correct}/${total})
- 用时: ${Math.floor(timeSpent/60)}分${timeSpent%60}秒
- 分类得分:
${catDetail}
${trendInfo}

请用中文回答，包含以下几个部分：
1. **总体评价**：对本次考试表现的简要评价
2. **薄弱考点**：指出最需要加强的考点类别（附具体建议）
3. **进步分析**：${history.length >= 2 ? '结合历史成绩分析是否有进步' : '这是第一次考试，后续会有进步趋势分析'}
4. **学习建议**：给出3条具体可执行的学习建议
5. **下次目标**：建议下次考试的正确率目标

请简洁清晰，避免过于笼统。`;

        try {
            const requestBody = {
                model: "YOUR_MODEL_ENDPOINT",
                stream: false,
                temperature: 0.5,
                max_output_tokens: 2000,
                input: [{ role: "user", content: [{ type: "input_text", text: prompt }] }]
            };
            const resp = await fetch('https://ark.cn-beijing.volces.com/api/v3/responses', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });
            if (!resp.ok) throw new Error(`API ${resp.status}`);
            const data = await resp.json();
            let text = '';
            if (data.output?.[0]?.content?.[0]?.text) text = data.output[0].content[0].text;
            else if (data.output?.choices?.[0]?.message?.content) text = data.output.choices[0].message.content;
            else if (data.choices?.[0]?.message?.content) text = data.choices[0].message.content;
            else throw new Error('返回格式错误');

            const html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
            content.innerHTML = `<div style="font-size:0.85rem; line-height:1.7; color:#1e293b;">${html}</div>`;
        } catch (err) {
            content.innerHTML = `<div style="color:#dc2626; font-size:0.85rem;">AI 分析失败: ${err.message}</div><button class="btn btn-sm btn-outline" style="margin-top:8px;" id="retryAiBtn">重试</button>`;
            document.getElementById('retryAiBtn').onclick = () => fetchAIAnalysis(categoryStats, accuracy, correct, total, timeSpent);
        }
    }

    // ---------- 考试历史记录页面 ----------
    async function renderExamHistory() {
        const history = await getAllExamHistory();
        history.sort((a, b) => b.timestamp - a.timestamp);

        let listHtml = '';
        if (history.length === 0) {
            listHtml = '<div style="text-align:center; padding:40px 20px; color:#94a3b8;">暂无考试记录</div>';
        } else {
            listHtml = history.map((h, i) => {
                const date = new Date(h.timestamp);
                const dateStr = `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
                const m = Math.floor(h.timeSpent / 60);
                const s = h.timeSpent % 60;
                const barColor = h.accuracy >= 80 ? '#16a34a' : h.accuracy >= 60 ? '#f59e0b' : '#dc2626';
                return `<div class="record-item" style="border-left:4px solid ${barColor};">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:600;">${h.accuracy}%</span>
                        <span style="font-size:0.75rem; color:#94a3b8;">${dateStr}</span>
                    </div>
                    <div style="font-size:0.8rem; color:#64748b; margin-top:4px;">
                        ${h.correct}/${h.totalQuestions} 正确 · 用时 ${m}:${String(s).padStart(2,'0')}
                    </div>
                </div>`;
            }).join('');
        }

        examArea.innerHTML = `
            <div class="card">
                <div class="card-label">📋 考试历史记录 (${history.length} 次)</div>
                ${listHtml}
            </div>
            ${history.length > 0 ? `
            <div class="card">
                <div class="card-label">📈 成绩趋势</div>
                <canvas id="historyChart" width="400" height="200" style="width:100%; height:200px;"></canvas>
            </div>
            <div style="text-align:center; margin-top:8px;">
                <button class="btn btn-danger btn-sm" id="clearExamHistoryBtn">🗑️ 清除所有考试记录</button>
            </div>` : ''}
            <div style="text-align:center; margin-top:8px;">
                <button class="btn btn-secondary" id="backToExamBtn">← 返回</button>
            </div>
        `;

        if (history.length > 0) {
            const sortedHistory = [...history].sort((a, b) => a.timestamp - b.timestamp);
            const canvas = document.getElementById('historyChart');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);

            const W = rect.width;
            const H = rect.height;
            const padL = 40, padR = 20, padT = 20, padB = 40;
            const chartW = W - padL - padR;
            const chartH = H - padT - padB;
            const scores = sortedHistory.map(h => h.accuracy);
            const n = scores.length;
            const stepX = n > 1 ? chartW / (n - 1) : chartW;

            ctx.clearRect(0, 0, W, H);
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padT + chartH * (1 - i / 5);
                ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + chartW, y); ctx.stroke();
                ctx.fillStyle = '#94a3b8'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
                ctx.fillText(`${i*20}%`, padL - 6, y + 3);
            }

            const gradient = ctx.createLinearGradient(0, padT, 0, padT + chartH);
            gradient.addColorStop(0, 'rgba(37, 99, 235, 0.3)');
            gradient.addColorStop(1, 'rgba(37, 99, 235, 0.02)');
            ctx.beginPath();
            scores.forEach((s, i) => {
                const x = padL + (n > 1 ? i * stepX : chartW / 2);
                const y = padT + chartH * (1 - s / 100);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.lineTo(padL + (n > 1 ? (n-1) * stepX : chartW/2), padT + chartH);
            ctx.lineTo(padL, padT + chartH);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();

            ctx.beginPath();
            scores.forEach((s, i) => {
                const x = padL + (n > 1 ? i * stepX : chartW / 2);
                const y = padT + chartH * (1 - s / 100);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();

            scores.forEach((s, i) => {
                const x = padL + (n > 1 ? i * stepX : chartW / 2);
                const y = padT + chartH * (1 - s / 100);
                ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2); ctx.fillStyle = '#2563eb'; ctx.fill();
                ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();
                ctx.fillStyle = '#2563eb'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(`${s}%`, x, y - 8);
            });

            const clearBtn = document.getElementById('clearExamHistoryBtn');
            if (clearBtn) {
                clearBtn.onclick = async () => {
                    if (confirm('确定清除所有考试历史记录？不可恢复。')) {
                        await clearExamHistory();
                        renderExamHistory();
                    }
                };
            }
        }

        document.getElementById('backToExamBtn').onclick = () => {
            examMode = 'ready';
            renderExamStart();
        };
    }

    // ---------- 刷题入口：按当前题目来源加载 ----------
    async function initQuiz() {
        await openDB();
        await loadWordDatabase();
        const savedSource = localStorage.getItem('toeic_question_source') || 'builtIn';
        syncQuestionSource(QUESTION_BANK_FILES[savedSource] || savedSource === 'ai' ? savedSource : 'builtIn');
        if (isBankSource()) await loadLocalQuestionBank(true);
        else renderQuickBankStatus();
        var aiRows = document.querySelectorAll('#aiDiffRow, #aiBatchRow');
        aiRows.forEach(function(r) {
            r.style.opacity = isBankSource() ? '0.4' : '1';
            r.style.pointerEvents = isBankSource() ? 'none' : 'auto';
        });
        await updateAllStatsAndRecords();
        quizArea.innerHTML = `<div class="card" style="text-align:center; color:#94a3b8; padding:40px 20px;">
            <div style="font-size:48px; margin-bottom:12px;">🧠</div>
            <div style="font-size:15px; font-weight:500;">当前：${isBankSource() ? getCurrentBankLabel() + '（' + localQuestionBank.length + '题）' : 'AI生成'}</div>
            <div style="font-size:0.85rem; margin-top:8px;">点击上方「开始刷题」启动</div>
        </div>`;
    }

    async function loadQuestionsFromLocal() {
        questionPool = [];
        const shuffled = [...localQuestionBank]
            .sort(() => Math.random() - 0.5)
            .map(q => {
                const letters = ['A','B','C','D'];
                const q2 = {...q};
                if (q2.correctIndex !== undefined) {
                    const correctIdx = q2.correctIndex;
                    const indices = [0,1,2,3];
                    for (let i = indices.length-1; i>0; i--) {
                        const j = Math.floor(Math.random()*(i+1));
                        [indices[i], indices[j]] = [indices[j], indices[i]];
                    }
                    q2.options = indices.map(i=>(q2.options||[])[i]);
                    q2.options_cn = indices.map(i=>(q2.options_cn||['','','',''])[i]);
                    q2.wrongOptionAnalysis = indices.map(i=>(q2.wrongOptionAnalysis||['','','',''])[i]);
                    q2.correctAnswer = letters[indices.indexOf(correctIdx)];
                    q2.correctIndex = indices.indexOf(correctIdx);
                }
                return q2;
            });
        questionPool.push(...shuffled);
        poolReady = true;
        questionHistory = [];
        questionIndex = -1;
        await fetchAndDisplayLocal();
    }

    function fetchAndDisplayLocal() {
        if (questionPool.length === 0) {
            quizArea.innerHTML = `<div class="card" style="text-align:center; padding:40px 20px; color:#94a3b8;">
                <div style="font-size:48px; margin-bottom:12px;">📖</div>
                <div style="font-size:15px; font-weight:500;">题库已做完！</div>
                <div style="font-size:0.85rem; margin-top:8px;">可切换为「AI生成」获取更多题目</div>
                <button class="btn btn-primary" style="margin-top:14px;" id="switchToAiBtn">🤖 切换AI生成</button>
                <button class="btn btn-secondary" style="margin-top:8px;" id="reloadLocalBtn">🔄 重新做题</button>
            </div>`;
            document.getElementById('switchToAiBtn').onclick = async () => {
                questionSourceSelect.value = 'ai';
                if (apiKey) await newBtn.onclick();
            };
            document.getElementById('reloadLocalBtn').onclick = async () => {
                await loadQuestionsFromLocal();
            };
            return;
        }
        const q = questionPool.shift();
        currentQuestion = q;
        selectedLetter = null;
        questionHistory.push(q);
        questionIndex = questionHistory.length - 1;
        renderQuestion(q, questionPool.length, true, true);
    }

    (async () => {
        await initQuiz();
    })();
</script>
