<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>题库管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f4f7fc;color:#1e293b;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:12px}
#app{width:100%;max-width:480px;background:#fff;border-radius:32px 32px 24px 24px;box-shadow:0 20px 60px rgba(0,20,40,0.12);overflow:hidden;display:flex;flex-direction:column;min-height:calc(100vh - 24px)}
.header{background:linear-gradient(135deg,#2563eb,#1d4ed8);padding:16px 16px 14px;color:#fff;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.header-main{display:flex;justify-content:space-between;align-items:center}
.header-left{display:flex;align-items:center;gap:10px}
.header-left a{background:rgba(255,255,255,.18);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none}
.header h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;margin:0}
.header-nav{display:flex;gap:4px;flex-wrap:wrap}
.header-nav a{flex:1 1 calc(33.33% - 4px);background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 4px;border-radius:14px;font-size:10px;cursor:pointer;text-align:center;text-decoration:none;white-space:nowrap}
.header-nav a:active{background:rgba(255,255,255,.3)}
.header-nav .current{background:rgba(255,255,255,.35);font-weight:600}
.content{flex:1;padding:16px 18px 20px;overflow-y:auto;animation:fadeIn .3s ease}
@keyframes fadeIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.card{background:#fff;border-radius:20px;padding:16px 18px;margin-bottom:14px;border:1px solid #f1f5f9;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.card-label{font-size:.7rem;font-weight:600;text-transform:uppercase;color:#64748b;margin-bottom:10px;letter-spacing:.5px}
.btn{border:none;color:#fff;padding:10px 20px;border-radius:40px;font-weight:600;cursor:pointer;font-size:.85rem;transition:transform .1s;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.96)}
.btn-primary{background:#2563eb}
.btn-danger{background:#fee2e2;color:#dc2626}
.btn-sm{padding:6px 14px;font-size:.8rem}
.btn-outline{background:transparent;border:1px solid #2563eb;color:#2563eb;padding:6px 14px;font-size:.8rem}
.btn:disabled{opacity:.5;cursor:not-allowed}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.stat-item{text-align:center;padding:12px 8px;background:#f8fafc;border-radius:16px}
.stat-num{font-size:1.5rem;font-weight:700;color:#2563eb}
.stat-label{font-size:.72rem;color:#94a3b8;margin-top:2px}
.cat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:.85rem}
.cat-row:last-child{border-bottom:none}
.cat-name{font-weight:500;color:#475569}
.cat-count{color:#2563eb;font-weight:600}
.search-box{display:flex;gap:8px;align-items:center;background:#f1f5f9;border-radius:40px;padding:4px 16px 4px 18px;margin-bottom:12px;border:1px solid transparent}
.search-box:focus-within{border-color:#2563eb;background:#fff}
.search-box input{flex:1;border:none;background:transparent;padding:10px 0;font-size:15px;outline:none;color:#1e293b}
.q-item{padding:12px;border-radius:14px;background:#f8fafc;margin-bottom:8px;border:1px solid #f1f5f9}
.q-text{font-size:.85rem;font-weight:500;color:#1e293b;line-height:1.4;word-break:break-all}
.q-meta{display:flex;gap:8px;margin-top:6px;font-size:.72rem;color:#94a3b8}
.q-badge{background:#eef2ff;color:#2563eb;padding:2px 8px;border-radius:10px}
.q-del{float:right;background:#fee2e2;color:#dc2626;border:none;padding:4px 10px;border-radius:20px;font-size:.72rem;cursor:pointer}
.import-area{border:2px dashed #cbd5e1;border-radius:20px;padding:30px 20px;text-align:center;cursor:pointer;transition:border-color .25s}
.import-area:active,.import-area.dragover{border-color:#2563eb;background:#eff6ff}
.import-area input[type="file"]{display:none}
.result-msg{margin-top:10px;font-size:.85rem;padding:10px;border-radius:14px;text-align:center}
.result-msg.success{background:#dcfce7;color:#16a34a}
.result-msg.error{background:#fee2e2;color:#dc2626}
.bottom-nav{display:flex;border-top:1px solid #f1f5f9;background:#fff;flex-shrink:0}
.bottom-nav a{flex:1;border:none;background:none;padding:10px 0 12px;font-size:12px;color:#94a3b8;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:500;text-decoration:none}
.bottom-nav a .nav-icon{font-size:20px}
.bottom-nav a:active{opacity:.6}
.bottom-nav a.active{color:#2563eb;font-weight:600}
.spinner{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:30px 20px;color:#94a3b8}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.tab-bar{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar button{flex-shrink:0;border:none;background:#f1f5f9;color:#64748b;padding:8px 16px;border-radius:20px;font-size:.8rem;font-weight:500;cursor:pointer;white-space:nowrap}
.tab-bar button.active{background:#2563eb;color:#fff}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
</head>
<body>
<div id="app">
<header class="header">
<div class="header-main"><div class="header-left"><a href="index.html">🏠</a><h1>🗄️ 题库管理</h1></div></div>
<div class="header-nav">
<a href="index.html">🏠 主页</a>
<a href="vocabulary_app.html">📘 单词</a>
<a href="practice_coach.html">🧠 刷题</a>
<a href="vocab_story.html">📖 故事</a>
<a href="question_bank.html" class="current">🗄 题库</a>
<a href="question_batch_generator.html">📦 批量生成</a>
</div>
</header>
<div class="content" id="content"><div class="spinner"></div><div style="text-align:center;color:#94a3b8;font-size:.85rem">正在加载数据库...</div></div>
<nav class="bottom-nav">
<a href="index.html"><span class="nav-icon">🏠</span> 首页</a>
<a href="vocabulary_app.html"><span class="nav-icon">📘</span> 单词</a>
<a href="practice_coach.html"><span class="nav-icon">🧠</span> 刷题</a>
<a href="vocab_story.html"><span class="nav-icon">📖</span> 故事</a>
<a href="question_bank.html" class="active"><span class="nav-icon">🗄</span> 题库</a>
<a href="question_batch_generator.html"><span class="nav-icon">📦</span> 批量生成</a>
</nav>
</div>
<script src="js/sql-wasm.js"></script>
<script src="js/db.js"></script>
<script>
(function(){
'use strict';
var content=document.getElementById('content');

ToeicDB.init().then(function(){
renderMain();
}).catch(function(e){
content.innerHTML='<div class="result-msg error">DB init failed: '+e.message+'</div>';
});

function esc(s){
if(!s)return'';
var d=document.createElement('div');
d.textContent=s;
return d.innerHTML;
}

function renderMain(){
content.innerHTML=''
+'<div class="tab-bar">'
+'<button class="active" data-tab="stats">📊 统计</button>'
+'<button data-tab="import">📥 导入</button>'
+'<button data-tab="search">🔍 搜索</button>'
+'<button data-tab="danger">⚠️ 管理</button>'
+'</div>'
+'<div id="tabContent"></div>';
setupTabs();
showTab('stats');
}

function setupTabs(){
var btns=content.querySelectorAll('.tab-bar button');
btns.forEach(function(btn){
btn.onclick=function(){showTab(btn.getAttribute('data-tab'));};
});
}

function showTab(tab){
var btns=content.querySelectorAll('.tab-bar button');
btns.forEach(function(b){b.classList.toggle('active',b.getAttribute('data-tab')===tab);});
var tc=document.getElementById('tabContent');
if(tab==='stats')renderStats(tc);
else if(tab==='import')renderImport(tc);
else if(tab==='search')renderSearch(tc);
else if(tab==='danger')renderDanger(tc);
}

function renderStats(tc){
var count=ToeicDB.getQuestionCount();
var cats=ToeicDB.getQuestionsByCategory();
var stats=ToeicDB.getRecordStats();
var catHtml='';
if(cats.length>0){
cats.forEach(function(c){
catHtml+='<div class="cat-row"><span class="cat-name">'+esc(c.category||'(uncategorized)')+'</span><span class="cat-count">'+c.cnt+'</span></div>';
});
}else{
catHtml='<div class="empty-state"><div class="icon">📂</div>暂无题目</div>';
}
tc.innerHTML=''
+'<div class="card"><div class="card-label">📊 题库统计</div>'
+'<div class="stat-grid">'
+'<div class="stat-item"><div class="stat-num">'+count+'</div><div class="stat-label">总题数</div></div>'
+'<div class="stat-item"><div class="stat-num">'+cats.length+'</div><div class="stat-label">考点分类</div></div>'
+'<div class="stat-item"><div class="stat-num">'+stats.total+'</div><div class="stat-label">刷题记录</div></div>'
+'</div></div>'
+'<div class="card"><div class="card-label">📂 分类统计</div>'+catHtml+'</div>';
}

function renderImport(tc){
tc.innerHTML=''
+'<div class="card"><div class="card-label">📥 导入题目</div>'
+'<div class="import-area" id="importArea">'
+'<input type="file" id="importInput" accept=".json">'
+'<div style="font-size:28px;margin-bottom:8px">📤</div>'
+'<div style="font-weight:500;color:#1e293b">点击选择或拖拽 JSON 文件</div>'
+'<div style="font-size:.78rem;color:#94a3b8;margin-top:4px">自动去重，已有题目不会重复导入</div>'
+'</div>'
+'<div id="importResult"></div>'
+'</div>'
+'<div class="card"><div class="card-label">📄 快捷操作</div>'
+'<div style="display:flex;gap:8px;flex-wrap:wrap">'
+'<button class="btn btn-primary btn-sm" id="loadDefaultBtn">📄 加载内置题库</button>'
+'<button class="btn btn-outline btn-sm" id="exportBtn">📥 导出为JSON</button>'
+'</div></div>';

var area=document.getElementById('importArea');
var input=document.getElementById('importInput');
var result=document.getElementById('importResult');
area.onclick=function(){input.click()};
area.ondragover=function(e){e.preventDefault();area.classList.add('dragover')};
area.ondragleave=function(){area.classList.remove('dragover')};
area.ondrop=function(e){e.preventDefault();area.classList.remove('dragover');if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])};
input.onchange=function(e){if(e.target.files[0])handleFile(e.target.files[0])};

document.getElementById('loadDefaultBtn').onclick=function(){
result.innerHTML='<div class="spinner"></div>';
fetch('toeic_questions_sample.json?t='+Date.now()).then(function(r){return r.json()}).then(function(data){
var questions=Array.isArray(data)?data:[];
var r=ToeicDB.importQuestions(questions);
result.innerHTML='<div class="result-msg success">内置题库导入完成：新增 '+r.added+' 题，跳过 '+r.skipped+' 题（已存在），共 '+r.total+' 题</div>';
}).catch(function(e){
result.innerHTML='<div class="result-msg error">加载失败: '+e.message+'</div>';
});
};

document.getElementById('exportBtn').onclick=function(){
var json=ToeicDB.exportAsJSON();
var blob=new Blob([JSON.stringify(json.questions,null,2)],{type:'application/json'});
var url=URL.createObjectURL(blob);
var a=document.createElement('a');
a.href=url;
a.download='toeic_questions_'+new Date().toISOString().slice(0,10)+'.json';
a.click();
URL.revokeObjectURL(url);
};

function handleFile(file){
var reader=new FileReader();
reader.onload=function(e){
try{
var data=JSON.parse(e.target.result);
var questions=Array.isArray(data)?data:(data.questions||[]);
var r=ToeicDB.importQuestions(questions);
result.innerHTML='<div class="result-msg success">导入完成：新增 '+r.added+' 题，跳过 '+r.skipped+' 题（已存在），共 '+r.total+' 题</div>';
}catch(err){
result.innerHTML='<div class="result-msg error">导入失败: '+err.message+'</div>';
}
};
reader.readAsText(file);
}
}

function renderSearch(tc){
tc.innerHTML=''
+'<div class="card"><div class="card-label">🔍 搜索题目</div>'
+'<div class="search-box"><span style="font-size:16px">🔎</span>'
+'<input type="text" id="searchInput" placeholder="搜索题干或考点..."></div>'
+'<div id="searchResults"></div></div>';

var input=document.getElementById('searchInput');
var results=document.getElementById('searchResults');
var timer=null;
input.oninput=function(){
clearTimeout(timer);
timer=setTimeout(function(){
var kw=input.value.trim();
if(!kw){results.innerHTML='';return}
var rows=ToeicDB.searchQuestions(kw);
if(rows.length===0){
results.innerHTML='<div style="text-align:center;color:#94a3b8;padding:20px">未找到匹配题目</div>';
return;
}
var h='';
rows.forEach(function(q){
var opts=JSON.parse(q.options||'[]');
var optHtml='';
opts.forEach(function(o,i){optHtml+='<div style="font-size:.78rem;color:#64748b;padding:2px 0">'+String.fromCharCode(65+i)+'. '+esc(o)+'</div>'});
h+='<div class="q-item">'
+'<button class="q-del" data-id="'+q.id+'">删除</button>'
+'<div class="q-text">'+esc(q.question_text)+'</div>'
+'<div class="q-meta">'
+'<span class="q-badge">'+esc(q.category||'general')+'</span>'
+'<span>难度:'+q.difficulty+'</span>'
+'</div>'
+'<div style="margin-top:6px">'+optHtml+'</div>'
+'</div>';
});
results.innerHTML=h;
results.querySelectorAll('.q-del').forEach(function(btn){
btn.onclick=function(){
if(confirm('确定删除此题？')){
ToeicDB.deleteQuestion(parseInt(btn.getAttribute('data-id')));
btn.closest('.q-item').remove();
}
};
});
},300);
};
input.focus();
}

function renderDanger(tc){
tc.innerHTML=''
+'<div class="card"><div class="card-label">⚠️ 危险操作</div>'
+'<div style="display:flex;gap:8px;flex-wrap:wrap">'
+'<button class="btn btn-danger btn-sm" id="clearQuestionsBtn">🗑 清空题库</button>'
+'<button class="btn btn-danger btn-sm" id="clearRecordsBtn">🗑 清空刷题记录</button>'
+'<button class="btn btn-danger btn-sm" id="clearAllBtn">💣 清空全部数据</button>'
+'</div></div>'
+'<div class="card"><div class="card-label">💾 数据库备份</div>'
+'<div style="display:flex;gap:8px;flex-wrap:wrap">'
+'<button class="btn btn-primary btn-sm" id="backupBtn">📥 导出备份</button>'
+'<button class="btn btn-outline btn-sm" id="restoreBtn">📤 导入恢复</button>'
+'<input type="file" id="restoreInput" accept=".json" style="display:none">'
+'</div></div>';

document.getElementById('clearQuestionsBtn').onclick=function(){
if(confirm('确定清空题库？此操作不可撤销！')){
ToeicDB.clearAllQuestions();
showTab('stats');
}
};

document.getElementById('clearRecordsBtn').onclick=function(){
if(confirm('确定清空刷题记录？')){
ToeicDB.clearAllRecords();
ToeicDB.clearExamHistory();
showTab('stats');
}
};

document.getElementById('clearAllBtn').onclick=function(){
if(confirm('确定清空全部数据？此操作不可撤销！')){
ToeicDB.clearAllQuestions();
ToeicDB.clearAllRecords();
ToeicDB.clearExamHistory();
showTab('stats');
}
};

document.getElementById('backupBtn').onclick=function(){
var json=ToeicDB.exportAsJSON();
var blob=new Blob([JSON.stringify(json,null,2)],{type:'application/json'});
var url=URL.createObjectURL(blob);
var a=document.createElement('a');
a.href=url;
a.download='toeic_backup_'+new Date().toISOString().slice(0,10)+'.json';
a.click();
URL.revokeObjectURL(url);
};

var restoreInput=document.getElementById('restoreInput');
document.getElementById('restoreBtn').onclick=function(){restoreInput.click()};
restoreInput.onchange=function(e){
var file=e.target.files[0];
if(!file)return;
var reader=new FileReader();
reader.onload=function(ev){
try{
var data=JSON.parse(ev.target.result);
if(data.questions){
var r=ToeicDB.importQuestions(data.questions);
alert('恢复完成：导入 '+r.added+' 题');
}
showTab('stats');
}catch(err){
alert('恢复失败: '+err.message);
}
};
reader.readAsText(file);
};
}

})();
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(e){console.log('SW registration failed:',e)})}
</script>
</body>
</html>
